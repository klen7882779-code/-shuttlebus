<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>接駁名單 · 司機</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f8fafc; }
  #root { min-height: 100vh; }
  .spin { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: r 0.8s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
  a.tel { text-decoration: none; }
</style>
</head>
<body>
<div id="root"><div style="display:flex;justify-content:center;align-items:center;height:100vh"><div class="spin"></div></div></div>

<script type="module">
import {
  h, useState, useEffect, useMemo, createRoot, DOC, onSnapshot,
  SEAT_CAP, ROUTES, ROUTE_STOPS, SIDE_COLORS, WEEKDAYS, WEEKENDS, DAY_NAME,
  tk, EMPTY, buildGrid, dot, tabGroup, tabBtn
} from "./app-core.js";

function todayTab(){ const d=new Date().getDay(); return (d===0||d===6)?"weekend":"weekday"; }

// 梯次標籤底色（淡）
const TAG_BG = { A:"#ede9fe", B:"#fce7f3", R:"#cffafe" };
const TAG_FG = { A:"#6d28d9", B:"#be185d", R:"#0e7490" };

function Driver() {
  const [tab, setTab] = useState(todayTab());
  const [numA, setNumA] = useState(459);
  const [summer, setSummer] = useState(false);
  const [numB, setNumB] = useState(458);
  const [data, setData] = useState({});
  const [loaded, setLoaded] = useState(false);

  useEffect(() => {
    const unsub = onSnapshot(DOC, (snap)=>{
      const v=snap.data();
      if(v){
        setData(v.data||{});
        setSummer(!!v.summer);
        if(typeof v.numA==="number")setNumA(v.numA);
        if(typeof v.numB==="number")setNumB(v.numB);
      }
      setLoaded(true);
    }, (e)=>{console.error(e);setLoaded(true);});
    return ()=>unsub();
  }, []);

  const labelOf=(s)=> s==="A"?`${numA}A` : s==="B"?`${numB}B` : "補考/機車";
  const cell=(k)=>data[k]||EMPTY();
  const used=(k)=>{const c=cell(k);return c.A.length+c.B.length+c.R.length;};
  const grid = useMemo(()=>buildGrid(tab, summer),[tab, summer]);
  const days = tab==="weekday"?WEEKDAYS:WEEKENDS;
  const todayDay = new Date().getDay();
  // 預設選今天；今天若不在當前分頁的日子裡，就選第一天
  const [selDay, setSelDay] = useState(days.includes(todayDay)?todayDay:days[0]);
  // 切換平日/假日時，自動把選中日校正到合法範圍
  useEffect(()=>{ if(!days.includes(selDay)) setSelDay(days.includes(todayDay)?todayDay:days[0]); },[tab]);
  const shownDays = days.includes(selDay)?[selDay]:[days[0]];

  if(!loaded) return h("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh"}},h("div",{className:"spin"}));

  return h("div",{style:{fontFamily:"system-ui,sans-serif",maxWidth:820,margin:"0 auto",padding:16,color:"#1f2937"}},
    h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:8,flexWrap:"wrap"}},
      h("h1",{style:{fontSize:20,fontWeight:800,margin:0}},"接駁名單 ",h("span",{style:{fontSize:13,color:"#6b7280",fontWeight:500}},"司機")),
      h("div",{style:tabGroup},
        h("button",{onClick:()=>setTab("weekday"),style:tabBtn(tab==="weekday")},"平日"),
        h("button",{onClick:()=>setTab("weekend"),style:tabBtn(tab==="weekend")},"假日"),
      ),
      h("span",{style:{marginLeft:"auto",fontSize:12,color:"#059669"}},"● 即時"),
    ),
    // 當期梯次圖例
    h("div",{style:{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10,fontSize:12}},
      tag("A",`${numA}A`), tag("B",`${numB}B`), tag("R","補考/機車"),
    ),
    // 星期切換
    h("div",{style:{display:"flex",gap:6,flexWrap:"wrap",marginBottom:14}},
      days.map(day=>{
        const sel=day===selDay; const isT=day===todayDay;
        return h("button",{key:day,onClick:()=>setSelDay(day),style:{position:"relative",padding:"8px 14px",borderRadius:10,border:sel?"none":"1px solid #e5e7eb",background:sel?"#2563eb":"#fff",color:sel?"#fff":"#374151",fontSize:14,fontWeight:700,cursor:"pointer"}},
          "週"+DAY_NAME[day],
          isT?h("span",{style:{marginLeft:4,fontSize:10,color:sel?"#bfdbfe":"#2563eb",fontWeight:600}},"今天"):null);
      }),
    ),
    shownDays.map(day=>{
      const isToday = day===todayDay;
      const slotRows = grid.map(row=>{
        const dc = row.days.find(x=>x.day===day);
        if(!dc || dc.routes.length===0) return null;
        return { time: row.slot.time, label: row.slot.label, summer: row.slot.summer, routes: dc.routes };
      }).filter(Boolean);
      if(slotRows.length===0) return null;
      return h("div",{key:day,style:{marginBottom:18,border:isToday?"2px solid #2563eb":"1px solid #e5e7eb",borderRadius:12,overflow:"hidden",background:"#fff"}},
        h("div",{style:{padding:"10px 14px",background:isToday?"#eff6ff":"#f8fafc",fontWeight:800,fontSize:16,display:"flex",alignItems:"center",gap:8}},
          "週"+DAY_NAME[day], isToday?h("span",{style:{fontSize:11,background:"#2563eb",color:"#fff",borderRadius:6,padding:"1px 8px",fontWeight:600}},"今天"):null),
        slotRows.map(sr=>h("div",{key:sr.time,style:{padding:"10px 14px",borderTop:"1px solid #f1f5f9",background:sr.summer?"#fff7ed":"transparent"}},
          h("div",{style:{display:"flex",alignItems:"baseline",gap:8,marginBottom:8,paddingBottom:4,borderBottom:"2px solid #e2e8f0"}},
            h("span",{style:{fontSize:24,fontWeight:900,color:sr.summer?"#c2410c":"#1e293b",letterSpacing:"0.5px"}},sr.time),
            h("span",{style:{fontWeight:sr.summer?700:500,color:sr.summer?"#ea580c":"#94a3b8",fontSize:14}},sr.summer?"☀暑期加開":sr.label)),
          sr.routes.map(({route,time})=>{
            const key=tk(route.id,day,time); const c=cell(key); const cnt=used(key);
            return h("div",{key:route.id,style:{marginBottom:10,paddingLeft:10,borderLeft:`4px solid ${route.color}`}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6,marginBottom:4}},
                h("span",{style:{fontSize:20,fontWeight:800,color:route.color}},route.name),
                // 各梯人數
                h("span",{style:{marginLeft:"auto",display:"flex",gap:6,fontSize:12}},
                  countChip("A",labelOf("A"),c.A.length),
                  countChip("B",labelOf("B"),c.B.length),
                  c.R.length>0?countChip("R","補考/機車",c.R.length):null,
                  h("span",{style:{fontWeight:700,color:"#334155"}},`共${cnt}位`),
                ),
              ),
              cnt>0
                ? h("div",null,
                    c.A.map(p=>personRow(p,"A",route,labelOf("A"))),
                    c.B.map(p=>personRow(p,"B",route,labelOf("B"))),
                    c.R.map(p=>personRow(p,"R",route,"補考/機車")),
                  )
                : h("div",{style:{fontSize:13,color:"#cbd5e1",padding:"4px 0"}},"（無人）"),
            );
          })
        )),
      );
    }),
    h("p",{style:{fontSize:12,color:"#9ca3af",marginTop:8}},"此頁即時更新，櫃台登記後自動出現。點電話可直接撥號。"),
  );

  function tag(side,label){
    return h("span",{style:{display:"inline-flex",alignItems:"center",gap:4,background:TAG_BG[side],color:TAG_FG[side],borderRadius:6,padding:"3px 8px",fontWeight:700}},
      h("span",{style:{width:8,height:8,borderRadius:2,background:SIDE_COLORS[side],display:"inline-block"}}), label);
  }
  function countChip(side,label,n){
    return h("span",{style:{background:TAG_BG[side],color:TAG_FG[side],borderRadius:5,padding:"1px 6px",fontWeight:700}},`${label} ${n}位`);
  }
}

// 一個人的清楚列：梯次標籤 + 姓名 + 站 + 電話(可撥) + 備註
function personRow(p, side, route, sideLabel){
  const stops = ROUTE_STOPS[route.id];
  return h("div",{key:p.id,style:{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid #f6f6f6",flexWrap:"wrap"}},
    h("span",{style:{background:TAG_BG[side],color:TAG_FG[side],borderRadius:5,padding:"2px 7px",fontSize:12,fontWeight:700,flexShrink:0}}, sideLabel),
    h("span",{style:{fontSize:15,fontWeight:700,minWidth:54}},p.name),
    stops && p.stop ? h("span",{style:{fontSize:12,color:"#475569",background:"#f1f5f9",borderRadius:5,padding:"1px 7px"}},"上車："+p.stop) : null,
    p.phone ? h("a",{href:`tel:${p.phone}`,className:"tel",style:{fontSize:13,color:"#2563eb",background:"#eff6ff",borderRadius:5,padding:"3px 9px",fontWeight:600,display:"inline-flex",alignItems:"center",gap:4}},"📞 "+p.phone) : null,
    p.note ? h("span",{style:{fontSize:12,color:"#0e7490",background:"#ecfeff",borderRadius:5,padding:"2px 7px"}},"備註："+p.note) : null,
  );
}

createRoot(document.getElementById("root")).render(h(Driver));
</script>
</body>
</html>
