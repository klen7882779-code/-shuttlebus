<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>接駁車週表 · 櫃台 · 第一駕訓班</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f1f5f9; }
  #root { min-height: 100vh; }
  .spin { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: r 0.8s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
  .gate { max-width: 320px; margin: 16vh auto; padding: 28px; background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); font-family: system-ui,sans-serif; }
  .gate input { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:16px; margin:12px 0; }
  .gate button { width:100%; padding:10px; border:none; border-radius:8px; background:#1f2937; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div id="root"><div style="display:flex;justify-content:center;align-items:center;height:100vh"><div class="spin"></div></div></div>

<script type="module">
import {
  h, useState, useEffect, useMemo, createRoot, DOC, LOG, onSnapshot, setDoc, getDoc, writeLog,
  SEAT_CAP, ROUTES, ROUTE_STOPS, SIDE_COLORS, WEEKDAYS, WEEKENDS, DAY_NAME,
  tk, EMPTY, fmtPhone, buildGrid, NameList, dot, tabGroup, tabBtn, thTime, thDay, tdTime, tdCell
} from "./app-core.js";

// ── 密碼（要改就改這兩行）────────────────────────────
const COUNTER_PASSWORD = "22102270";   // 櫃台登記
const ADMIN_PASSWORD   = "admin22102270"; // 異動紀錄頁（只有你）
const CLEAR_PASSWORD   = "22101079";       // 清空梯次

const ROUTE_NAME = Object.fromEntries(ROUTES.map(r=>[r.id,r.name]));
function slotDesc(key){ // 把 trip key 還原成可讀描述
  const [rid,day,time]=key.split("_");
  return `${ROUTE_NAME[rid]} 週${DAY_NAME[day]} ${time}`;
}

function Gate({ title, hint, pass, onPass }) {
  const [v,setV]=useState(""); const [err,setErr]=useState(false);
  function go(){ if(v===pass){ onPass(); } else setErr(true); }
  return h("div",{className:"gate"},
    h("div",{style:{fontSize:18,fontWeight:800,marginBottom:4}},title),
    h("div",{style:{fontSize:13,color:"#6b7280"}},hint),
    h("input",{type:"password",value:v,placeholder:"密碼",onChange:(e)=>{setV(e.target.value);setErr(false);},onKeyDown:(e)=>e.key==="Enter"&&go()}),
    err?h("div",{style:{color:"#dc2626",fontSize:13,marginBottom:8}},"密碼錯誤"):null,
    h("button",{onClick:go},"進入"),
  );
}

function Counter() {
  const [tab, setTab] = useState("weekday");
  const [page, setPage] = useState("table"); // table | log
  const [numA, setNumA] = useState(459);      // 營運 A 欄期數
  const [numB, setNumB] = useState(458);      // 營運 B 欄期數
  const [prepNumA, setPrepNumA] = useState(460); // 預備 A 期數
  const [prepNumB, setPrepNumB] = useState(459); // 預備 B 期數
  const [data, setData] = useState({});       // 營運名單
  const [prep, setPrep] = useState({});       // 新生預備名單
  const [archive, setArchive] = useState([]); // 封存（升期退場），留30天
  const [openCell, setOpenCell] = useState(null);
  const [allOpen, setAllOpen] = useState(true); // 預設全部攤開
  const [closedSet, setClosedSet] = useState({}); // 全開模式下，被單獨收起的格子
  const [clip, setClip] = useState(null); // 複製來源 {mode:'cell'|'day', table, key?, day?}
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [operator, setOperator] = useState(localStorage.getItem("op_name")||"");
  const [staff, setStaff] = useState([]);
  const [showHelp, setShowHelp] = useState(localStorage.getItem("hide_help")!=="1");
  const [summer, setSummer] = useState(false);

  useEffect(() => {
    const unsub = onSnapshot(DOC, (snap)=>{
      const v=snap.data();
      if(v){
        setData(v.data||{});
        setPrep(v.prep||{});
        setSummer(!!v.summer);
        if(typeof v.numA==="number")setNumA(v.numA);
        if(typeof v.numB==="number")setNumB(v.numB);
        if(typeof v.prepNumA==="number")setPrepNumA(v.prepNumA);
        if(typeof v.prepNumB==="number")setPrepNumB(v.prepNumB);
        setArchive(v.archive||[]);
        setStaff(v.staff||[]);
      }
      setLoaded(true);
    }, (e)=>{console.error(e);setLoaded(true);});
    return ()=>unsub();
  }, []);

  // 浮動表頭：原表頭捲出畫面頂端時，複製一條固定在最上方
  useEffect(()=>{
    let clone=null;
    function sync(){
      const thead=document.getElementById("mainThead");
      const table=document.getElementById("mainTable");
      const wrap=document.getElementById("tableWrap");
      if(!thead||!table||!wrap){ if(clone){clone.remove();clone=null;} return; }
      const rect=thead.getBoundingClientRect();
      const wrapRect=wrap.getBoundingClientRect();
      // 表頭捲到畫面頂以上，且表格還在畫面內 → 顯示浮動表頭
      const shouldShow = rect.top < 0 && wrapRect.bottom > 40;
      if(shouldShow){
        if(!clone){
          clone=document.createElement("div");
          clone.style.position="fixed";
          clone.style.top="0";
          clone.style.zIndex="50";
          clone.style.overflow="hidden";
          clone.style.pointerEvents="none";
          clone.style.boxShadow="0 2px 6px rgba(0,0,0,0.08)";
          document.body.appendChild(clone);
        }
        // 對齊原表格位置與寬度，並跟隨橫向捲動
        clone.style.left=wrapRect.left+"px";
        clone.style.width=wrapRect.width+"px";
        const tb=document.createElement("table");
        tb.style.borderCollapse="separate";
        tb.style.borderSpacing="0";
        tb.style.width=table.offsetWidth+"px";
        tb.style.tableLayout="fixed";
        tb.style.marginLeft=(-wrap.scrollLeft)+"px";
        const headTr=thead.querySelector("tr");
        const newThead=document.createElement("thead");
        const newTr=document.createElement("tr");
        const origThs=headTr.querySelectorAll("th");
        origThs.forEach(th=>{
          const ntd=document.createElement("th");
          ntd.style.width=th.offsetWidth+"px";
          ntd.style.background="#f9fafb";
          ntd.style.borderBottom="2px solid #e5e7eb";
          ntd.style.padding="8px";
          ntd.style.fontSize="14px";
          ntd.style.fontWeight="700";
          ntd.style.textAlign="center";
          // 只取「週X」那行文字，不含按鈕
          const dayDiv=th.querySelector("div");
          ntd.textContent = dayDiv ? dayDiv.textContent : th.textContent;
          newTr.appendChild(ntd);
        });
        newThead.appendChild(newTr);
        tb.appendChild(newThead);
        clone.innerHTML="";
        clone.appendChild(tb);
      } else if(clone){ clone.remove(); clone=null; }
    }
    window.addEventListener("scroll",sync,{passive:true});
    window.addEventListener("resize",sync);
    const wrap=document.getElementById("tableWrap");
    if(wrap) wrap.addEventListener("scroll",sync,{passive:true});
    sync();
    return ()=>{
      window.removeEventListener("scroll",sync);
      window.removeEventListener("resize",sync);
      if(wrap) wrap.removeEventListener("scroll",sync);
      if(clone){clone.remove();clone=null;}
    };
  });

  const who = () => operator.trim();
  function requireOp(){
    if(!who()){ alert("請先在右上角選擇操作者，才能登記或修改。"); return false; }
    return true;
  }

  async function persist(patch) {
    setSaving(true);
    const payload = {
      data, prep, numA, numB, prepNumA, prepNumB, archive, staff, summer,
      ...patch, updatedAt: Date.now(),
    };
    try { await setDoc(DOC, payload); }
    catch(e){ console.error(e); alert("儲存失敗，請檢查網路"); }
    setSaving(false);
  }
  // 梯次名組合
  const nameA = ()=>`${numA}A`;
  const nameB = ()=>`${numB}B`;
  const prepNameA = ()=>`${prepNumA}A`;
  const prepNameB = ()=>`${prepNumB}B`;
  const cell=(k)=>data[k]||EMPTY();
  const used=(k)=>{const c=cell(k);return c.A.length+c.B.length+c.R.length;};
  const left=(k)=>SEAT_CAP-used(k);

  // 預備表 cell
  const pcell=(k)=>prep[k]||EMPTY();
  // 預備剩餘位 = 10 − 營運表對向欄人數（預備A看營運B、預備B看營運A）
  function prepLeft(k, side){
    const oc = data[k]||EMPTY();
    const opposite = side==="A" ? oc.B.length : oc.A.length;
    const usedThis = (prep[k]||EMPTY())[side].length;
    return SEAT_CAP - opposite - usedThis;
  }

  // ── 營運表操作 ──
  function addP(k,side,name,phone,stop,note){
    if(!requireOp())return;
    if(!name.trim()||left(k)<=0)return;
    const c=data[k]||EMPTY();
    const person={id:Date.now(),name:name.trim(),phone:phone.trim(),note:(note||"").trim()};
    if(stop) person.stop=stop;
    const next={...data,[k]:{...c,[side]:[...c[side],person]}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:"新增", slot:slotDesc(k), side, name:name.trim() });
  }
  function removeP(k,side,id){
    if(!requireOp())return;
    const c=data[k]||EMPTY();
    const target=c[side].find(x=>x.id===id);
    if(!confirm(`確定刪除「${target?target.name:""}」？`)) return;
    const next={...data,[k]:{...c,[side]:c[side].filter(x=>x.id!==id)}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:"刪除", slot:slotDesc(k), side, name:target?target.name:"" });
  }
  function editP(k,side,id,fields){
    if(!requireOp())return;
    const c=data[k]||EMPTY();
    const old=c[side].find(x=>x.id===id);
    const updated=c[side].map(x=>{
      if(x.id!==id) return x;
      const nx={...x, name:fields.name.trim(), phone:(fields.phone||"").trim(), note:(fields.note||"").trim()};
      if(fields.stop) nx.stop=fields.stop; else delete nx.stop;
      return nx;
    });
    const next={...data,[k]:{...c,[side]:updated}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:"修改", slot:slotDesc(k), side, name:`${old?old.name:""} → ${fields.name.trim()}` });
  }

  // ── 預備表操作（不用密碼，跟登記一樣選操作者即可）──
  function addPrep(k,side,name,phone,stop,note){
    if(!requireOp())return;
    if(!name.trim()||prepLeft(k,side)<=0)return;
    const c=prep[k]||EMPTY();
    const person={id:Date.now(),name:name.trim(),phone:phone.trim(),note:(note||"").trim()};
    if(stop) person.stop=stop;
    const next={...prep,[k]:{...c,[side]:[...c[side],person]}};
    setPrep(next);persist({prep:next});
    writeLog({ who:who(), act:"預備新增", slot:slotDesc(k), side, name:name.trim() });
  }
  function removePrep(k,side,id){
    if(!requireOp())return;
    const c=prep[k]||EMPTY();
    const target=c[side].find(x=>x.id===id);
    if(!confirm(`確定刪除「${target?target.name:""}」？`)) return;
    const next={...prep,[k]:{...c,[side]:c[side].filter(x=>x.id!==id)}};
    setPrep(next);persist({prep:next});
    writeLog({ who:who(), act:"預備刪除", slot:slotDesc(k), side, name:target?target.name:"" });
  }
  function editPrep(k,side,id,fields){
    if(!requireOp())return;
    const c=prep[k]||EMPTY();
    const updated=c[side].map(x=>{
      if(x.id!==id) return x;
      const nx={...x, name:fields.name.trim(), phone:(fields.phone||"").trim(), note:(fields.note||"").trim()};
      if(fields.stop) nx.stop=fields.stop; else delete nx.stop;
      return nx;
    });
    const next={...prep,[k]:{...c,[side]:updated}};
    setPrep(next);persist({prep:next});
  }

  // ── 升期：把預備某欄整批搬入營運，舊欄封存退場 ──
  function promote(side){
    if(!requireOp()) return;
    const oldName = side==="A"?nameA():nameB();
    const newNum  = side==="A"?prepNumA:prepNumB;
    const newName = `${newNum}${side}`;
    const pw = prompt(`升期：將「${newName}」升上車，「${oldName}」退場封存。\n請輸入升期密碼：`);
    if(pw===null) return;
    if(pw!==CLEAR_PASSWORD){ alert("升期密碼錯誤，未執行。"); return; }

    // 逐班檢查升期後會不會超載：新該欄人數 + 對向欄營運人數 > 10
    const overload=[];
    for(const k in prep){
      const pc=prep[k]; const oc=data[k]||EMPTY();
      const incoming=(pc[side]||[]).length;
      if(incoming===0) continue;
      const opposite = side==="A" ? oc.B.length : oc.A.length;
      if(incoming + opposite > SEAT_CAP) overload.push(`${slotDesc(k)}（新${incoming}+留${opposite}>${SEAT_CAP}）`);
    }
    if(overload.length){
      alert("以下班次升期後會超載，請先調整再升期：\n\n"+overload.join("\n"));
      return;
    }

    // 統計搬移人數
    let moved=0; for(const k in prep){ moved+=(prep[k][side]||[]).length; }
    if(!confirm(`確定升期？\n「${oldName}」全部退場封存，「${newName}」${moved} 位升上車。`)) return;

    // 執行：營運該欄 <- 預備該欄；舊營運該欄 -> 封存
    const archivedPeople=[];
    const nextData={...data};
    const nextPrep={...prep};
    const allKeys=new Set([...Object.keys(data),...Object.keys(prep)]);
    for(const k of allKeys){
      const oc=data[k]||EMPTY();
      const pc=prep[k]||EMPTY();
      // 收集舊營運該欄到封存
      (oc[side]||[]).forEach(pp=>archivedPeople.push({ slot:slotDesc(k), side, ...pp }));
      // 新營運該欄 = 預備該欄
      nextData[k]={...oc,[side]:(pc[side]||[])};
      // 預備該欄清空
      nextPrep[k]={...pc,[side]:[]};
    }
    const now=Date.now();
    const KEEP=30*24*60*60*1000;
    const nextArchive=[...archive.filter(a=>now-a.t<KEEP), { t:now, cohort:oldName, who:who(), people:archivedPeople }];

    const patch={ data:nextData, prep:nextPrep, archive:nextArchive };
    if(side==="A"){ patch.numA=newNum; patch.prepNumA=prepNumA+1; setNumA(newNum); setPrepNumA(prepNumA+1); }
    else          { patch.numB=newNum; patch.prepNumB=prepNumB+1; setNumB(newNum); setPrepNumB(prepNumB+1); }
    setData(nextData); setPrep(nextPrep); setArchive(nextArchive);
    persist(patch);
    writeLog({ who:who(), act:"升期", slot:`${side}欄`, name:`${oldName} 退場 → ${newName} 上車（${moved}位）` });
    alert(`升期完成：${newName} 已上車（${moved} 位），${oldName} 已封存。`);
  }

  // 手動微調期數（萬一要修），不搬人只改數字
  function setNum(which, val){
    const n=parseInt(val,10); if(isNaN(n)) return;
    if(which==="A"){ setNumA(n); persist({numA:n}); }
    else if(which==="B"){ setNumB(n); persist({numB:n}); }
    else if(which==="PA"){ setPrepNumA(n); persist({prepNumA:n}); }
    else if(which==="PB"){ setPrepNumB(n); persist({prepNumB:n}); }
  }

  // ── 複製 / 貼上 ──────────────────────────────────
  const curTable = page==="prep" ? "prep" : "data";
  const curData  = page==="prep" ? prep : data;
  const curCell  = (k)=> (page==="prep"?prep:data)[k] || EMPTY();

  function startCopyCell(key){ setClip({ mode:"cell", table:curTable, key }); }
  function startCopyDay(day){ setClip({ mode:"day", table:curTable, day }); }
  function startCopyPerson(key, side, person){ setClip({ mode:"person", table:curTable, key, side, person }); }
  function cancelCopy(){ setClip(null); }

  // 把一個 person 依目標路線調整站點後回傳新物件（跨線站點處理）
  function adaptPerson(p, destRouteId){
    const np = { ...p, id: Date.now()+Math.floor(Math.random()*100000) };
    const stops = ROUTE_STOPS[destRouteId];
    if(stops){ if(!np.stop || !stops.includes(np.stop)) np.stop = stops[0]; }
    else { delete np.stop; }
    return np;
  }

  // 將 srcCell 的人疊加進 destKey（防爆，回傳 {next, added, skipped}）
  function mergeInto(destData, destKey, srcCell, destRouteId){
    const dc = destData[destKey] || EMPTY();
    const out = { A:[...dc.A], B:[...dc.B], R:[...dc.R] };
    let added=0, skipped=0;
    for(const side of ["A","B","R"]){
      for(const p of (srcCell[side]||[])){
        const total = out.A.length+out.B.length+out.R.length;
        if(total>=SEAT_CAP){ skipped++; continue; }
        out[side].push(adaptPerson(p, destRouteId));
        added++;
      }
    }
    destData[destKey]=out;
    return { added, skipped };
  }

  function pasteToCell(destKey){
    if(!clip) return;
    if(!requireOp()){ return; }
    const srcData = clip.table==="prep" ? prep : data;
    const destRouteId = destKey.split("_")[0];
    let srcCell, srcDesc;
    if(clip.mode==="cell"){ srcCell = srcData[clip.key]||EMPTY(); srcDesc=slotDesc(clip.key); }
    else if(clip.mode==="person"){ srcCell = { A:[], B:[], R:[], [clip.side]:[clip.person] }; srcDesc=`${clip.person.name}`; }
    else { alert("整天複製請點目標『那一天的標題』貼上，不是貼到單一格。"); return; }
    const srcTotal = srcCell.A.length+srcCell.B.length+srcCell.R.length;
    if(srcTotal===0){ alert("來源沒有乘客。"); cancelCopy(); return; }
    if(!confirm(`把「${srcDesc}」複製到「${slotDesc(destKey)}」？\n（疊加，超過 ${SEAT_CAP} 位的會略過）`)) return;
    const next = page==="prep" ? {...prep} : {...data};
    const { added, skipped } = mergeInto(next, destKey, srcCell, destRouteId);
    if(page==="prep"){ setPrep(next); persist({prep:next}); } else { setData(next); persist({data:next}); }
    writeLog({ who:who(), act:"複製", slot:`${srcDesc} → ${slotDesc(destKey)}`, name:`${added}位${skipped?`（略過${skipped}）`:""}` });
    cancelCopy();
    alert(`已複製 ${added} 位${skipped?`，${skipped} 位因滿座略過`:""}。`);
  }

  function pasteToDay(destDay){
    if(!clip) return;
    if(!requireOp()){ return; }
    const srcData = clip.table==="prep" ? prep : data;
    const next = page==="prep" ? {...prep} : {...data};
    let added=0, skipped=0, classes=0;

    if(clip.mode==="day"){
      if(clip.day===destDay){ alert("來源和目標是同一天。"); return; }
      // 來源那天所有 key → 目標同 route 同 time
      const srcKeys = Object.keys(srcData).filter(k=>{ const[,d]=k.split("_"); return Number(d)===clip.day; });
      // 也包含來源那天「buildGrid 有班但還沒人」的就跳過（沒人不用搬）
      const realSrc = srcKeys.filter(k=>{ const c=srcData[k]; return c && (c.A.length+c.B.length+c.R.length)>0; });
      if(realSrc.length===0){ alert("來源那天沒有任何乘客。"); cancelCopy(); return; }
      if(!confirm(`把「週${DAY_NAME[clip.day]}」整天名單，複製到「週${DAY_NAME[destDay]}」？\n（各班對應貼上、疊加，超過 ${SEAT_CAP} 位略過）`)) return;
      for(const k of realSrc){
        const [r,,t]=k.split("_");
        const destKey = tk(r,destDay,t);
        const res = mergeInto(next, destKey, srcData[k], r);
        added+=res.added; skipped+=res.skipped; classes++;
      }
      writeLog({ who:who(), act:"複製整天", slot:`週${DAY_NAME[clip.day]} → 週${DAY_NAME[destDay]}`, name:`${classes}班 ${added}位${skipped?`（略過${skipped}）`:""}` });
    } else {
      // 單班/單人來源，貼到某天 → 該天「同路線同時段」那班
      const [r,,t]=clip.key.split("_");
      const destKey = tk(r,destDay,t);
      const srcCell = clip.mode==="person"
        ? { A:[], B:[], R:[], [clip.side]:[clip.person] }
        : (srcData[clip.key]||EMPTY());
      const srcDesc = clip.mode==="person" ? clip.person.name : slotDesc(clip.key);
      const srcTotal=srcCell.A.length+srcCell.B.length+srcCell.R.length;
      if(srcTotal===0){ alert("來源沒有乘客。"); cancelCopy(); return; }
      if(!confirm(`把「${srcDesc}」複製到「${slotDesc(destKey)}」？`)) return;
      const res=mergeInto(next, destKey, srcCell, r); added=res.added; skipped=res.skipped;
      writeLog({ who:who(), act:"複製", slot:`${srcDesc} → ${slotDesc(destKey)}`, name:`${added}位${skipped?`（略過${skipped}）`:""}` });
    }
    if(page==="prep"){ setPrep(next); persist({prep:next}); } else { setData(next); persist({data:next}); }
    cancelCopy();
    alert(`已複製 ${added} 位${skipped?`，${skipped} 位因滿座略過`:""}。`);
  }

  const grid = useMemo(()=>buildGrid(tab, summer),[tab, summer]);
  // 展開邏輯：allOpen 時預設全開（closedSet 內的單獨收）；非 allOpen 時只開 openCell
  const isOpenFn = (key)=> allOpen ? !closedSet[key] : openCell===key;
  function toggleOpen(key){
    if(allOpen){ setClosedSet(s=>({...s,[key]: !s[key]})); }
    else { setOpenCell(openCell===key?null:key); }
  }
  function toggleAll(){
    if(allOpen){ setAllOpen(false); setOpenCell(null); setClosedSet({}); } // 全部收合
    else { setAllOpen(true); setClosedSet({}); } // 全部攤開
  }
  function toggleSummer(){ if(!requireOp())return; const v=!summer; setSummer(v); persist({summer:v}); writeLog({who:who(),act:"暑期模式",slot:tab==='weekday'?'平日':'假日',name:v?'開啟':'關閉'}); }
  function printWeek(onlyRid){
    const esc=(t)=>String(t==null?"":t).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
    const labelName=(s)=> s==="A"?(numA+"A") : s==="B"?(numB+"B") : "補考/機車";
    const ROUTE_NM={gongguan:"公館線",zhongxiao:"忠孝復興線",zhonghe:"中和線"};
    const allDays=[1,2,3,4,5,6,0];
    const routeOrder = onlyRid ? [onlyRid] : ["gongguan","zhongxiao","zhonghe"];
    let pages="";
    // 一條線一頁，內含整週（週一到週日）
    for(const rid of routeOrder){
      let body="";
      for(const day of allDays){
        const dTab=(day===0||day===6)?"weekend":"weekday";
        const g=buildGrid(dTab, summer);
        // 該線該天的所有時段
        const slotList=[];
        for(const row of g){
          const dc=row.days.find(x=>x.day===day);
          if(!dc) continue;
          const rt=dc.routes.find(x=>x.route.id===rid);
          if(rt) slotList.push({time:rt.time, summer:row.slot.summer});
        }
        if(slotList.length===0) continue;
        // 該天該線有沒有人
        let dayBody="", dayCount=0;
        for(const sl of slotList){
          const key=tk(rid,day,sl.time);
          const c=data[key]||EMPTY();
          const people=[].concat(c.A.map(p=>Object.assign({},p,{_s:"A"})),c.B.map(p=>Object.assign({},p,{_s:"B"})),c.R.map(p=>Object.assign({},p,{_s:"R"})));
          if(people.length===0) continue;
          dayCount+=people.length;
          dayBody+='<tr><td class="grp" rowspan="'+people.length+'">'+esc(sl.time)+(sl.summer?'<br><span class="su">暑期</span>':'')+'</td>';
          people.forEach(function(p,i){
            if(i>0) dayBody+="<tr>";
            dayBody+='<td>'+esc(labelName(p._s))+'</td><td class="nm">'+esc(p.name)+'</td><td>'+esc(p.phone||"")+'</td><td>'+esc(p.stop||"")+'</td><td>'+esc(p.note||"")+'</td><td class="sign"></td></tr>';
          });
        }
        if(dayCount===0) continue;
        body+='<tr class="dayhdr"><td colspan="7">週'+DAY_NAME[day]+'</td></tr>'+dayBody;
      }
      if(!body) continue;
      pages+='<div class="page"><h2>'+esc(ROUTE_NM[rid])+' 接駁名單　<span class="sub">'+numA+'A / '+numB+'B　整週</span></h2><table><thead><tr><th>時段</th><th>梯次</th><th>姓名</th><th>電話</th><th>上車站</th><th>備註</th><th>簽到</th></tr></thead><tbody>'+body+'</tbody></table></div>';
    }
    if(!pages){ alert((onlyRid?ROUTE_NM[onlyRid]:"")+"目前沒有名單可列印。"); return; }
    const html='<!DOCTYPE html><html lang="zh-Hant"><head><meta charset="UTF-8"><title>接駁名單</title><style>'
      +'*{box-sizing:border-box;}body{font-family:system-ui,"Microsoft JhengHei",sans-serif;margin:0;color:#111;}'
      +'.page{padding:18px 22px;page-break-after:always;}.page:last-child{page-break-after:auto;}'
      +'h2{font-size:20px;margin:0 0 10px;border-bottom:2px solid #333;padding-bottom:6px;}'
      +'.sub{font-size:13px;color:#666;font-weight:400;}'
      +'table{width:100%;border-collapse:collapse;font-size:14px;}'
      +'th,td{border:1px solid #999;padding:6px 8px;text-align:left;}th{background:#eee;font-size:13px;}'
      +'td.grp{font-weight:700;background:#f7f7f7;white-space:nowrap;text-align:center;vertical-align:middle;}'
      +'td.grp .rt{font-size:12px;color:#2563eb;}td.grp .su{font-size:11px;color:#c2410c;}'
      +'td.nm{font-weight:700;}td.sign{width:60px;}tr.dayhdr td{background:#dbeafe;font-weight:800;font-size:15px;text-align:left;}@media print{@page{margin:12mm;}}'
      +'</style></head><body>'+pages+'<scr'+'ipt>window.onload=function(){window.print();}</scr'+'ipt></body></html>';
    const w=window.open("","_blank");
    if(!w){ alert("瀏覽器擋住了新視窗，請允許彈出視窗後再試。"); return; }
    w.document.write(html); w.document.close();
  }
  const days = tab==="weekday"?WEEKDAYS:WEEKENDS;
  const labelOf=(s)=>s==="A"?nameA():s==="B"?nameB():"補考/機車";
  const prepLabelOf=(s)=>s==="A"?prepNameA():s==="B"?prepNameB():"補考/機車";

  if(!loaded) return h("div",{style:{display:"flex",justifyContent:"center",alignItems:"center",height:"100vh"}},h("div",{className:"spin"}));

  return h("div", { style:{ fontFamily:"system-ui,sans-serif",maxWidth:1750,margin:"0 auto",padding:16,color:"#1f2937" } },
    h("div", { style:{ display:"flex",alignItems:"center",gap:12,marginBottom:14,flexWrap:"wrap" } },
      h("h1", { style:{ fontSize:22,fontWeight:800,margin:0 } }, "接駁車週表 ", h("span",{style:{fontSize:13,color:"#6b7280",fontWeight:500}},"櫃台")),
      h("div", { style:tabGroup },
        h("button",{onClick:()=>setPage("table"),style:tabBtn(page==="table")},"班表"),
        h("button",{onClick:()=>setPage("prep"),style:tabBtn(page==="prep")},"新生預備班表"),
        h("button",{onClick:()=>setPage("log"),style:tabBtn(page==="log")},"異動紀錄"),
      ),
      h("button",{onClick:()=>printWeek("gongguan"),style:printBtn("#2563eb")},"🖨 公館"),
      h("button",{onClick:()=>printWeek("zhongxiao"),style:printBtn("#059669")},"🖨 忠孝"),
      h("button",{onClick:()=>printWeek("zhonghe"),style:printBtn("#d97706")},"🖨 中和"),
      h(OperatorPicker,{staff,operator,setOperator}),
      h("span",{style:{fontSize:12,color:saving?"#d97706":"#059669"}}, saving?"儲存中…":"● 已同步"),
    ),

    page==="log" ? h(LogPage,{archive}) :
    page==="prep" ? h("div",null,
      h("div",{style:{border:"1px solid #fde68a",background:"#fffbeb",borderRadius:12,padding:"10px 14px",marginBottom:14,fontSize:13,color:"#92400e"}},
        "這是下期招生的預備名單，不佔營運車位。每班「剩 N」= 10 − 升期後仍留車上的對向梯次人數，填滿就無法再加（避免升期爆位）。等該梯開課，到「班表」頁按升期搬上車。"),
      h("div", { style:{ display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap",fontSize:14 } },
        h("div", { style:tabGroup },
          h("button",{onClick:()=>setTab("weekday"),style:tabBtn(tab==="weekday")},"平日 一～五"),
          h("button",{onClick:()=>setTab("weekend"),style:tabBtn(tab==="weekend")},"假日 六日"),
        ),
        h("span",{style:{color:"#6b7280",marginLeft:8}},"預備期數："),
        h("label",{style:{display:"flex",alignItems:"center",gap:4}},h("span",{style:dot(SIDE_COLORS.A)}),h(NumBox,{val:prepNumA,onSave:(v)=>setNum("PA",v)}),"A"),
        h("label",{style:{display:"flex",alignItems:"center",gap:4}},h("span",{style:dot(SIDE_COLORS.B)}),h(NumBox,{val:prepNumB,onSave:(v)=>setNum("PB",v)}),"B"),
        tab==="weekday"?h("button",{onClick:toggleSummer,style:summer?summerOnBtn:summerOffBtn},summer?"☀ 暑期加開中（點此關閉）":"☀ 暑期加開"):null,
        h("button",{onClick:toggleAll,style:{padding:"5px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"#fff",color:"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}, allOpen?"▲ 全部收合":"▼ 全部攤開"),
      ),
      h(WeekTable,{
        grid,days,isOpenFn,toggleOpen,
        cellOf:pcell, leftOf:(k)=>Math.min(prepLeft(k,"A"),prepLeft(k,"B")),
        labelA:prepNameA(), labelB:prepNameB(),
        prepMode:true, prepLeftFn:prepLeft,
        addP:addPrep, removeP:removePrep, editP:editPrep, labelOf:prepLabelOf,
        clip, startCopyCell, startCopyDay, startCopyPerson, pasteToCell, pasteToDay, cancelCopy,
      }),
    ) : h("div",null,
      h(HelpBox,{showHelp,setShowHelp}),
      h("div", { style:{ display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap",fontSize:14 } },
        h("div", { style:tabGroup },
          h("button",{onClick:()=>setTab("weekday"),style:tabBtn(tab==="weekday")},"平日 一～五"),
          h("button",{onClick:()=>setTab("weekend"),style:tabBtn(tab==="weekend")},"假日 六日"),
        ),
        h("span",{style:{color:"#6b7280",marginLeft:8}},"本期："),
        h("label",{style:{display:"flex",alignItems:"center",gap:4}},h("span",{style:dot(SIDE_COLORS.A)}),h(NumBox,{val:numA,onSave:(v)=>setNum("A",v)}),"A"),
        h("label",{style:{display:"flex",alignItems:"center",gap:4}},h("span",{style:dot(SIDE_COLORS.B)}),h(NumBox,{val:numB,onSave:(v)=>setNum("B",v)}),"B"),
        h("span",{style:{display:"flex",alignItems:"center",gap:4,color:"#6b7280"}},h("span",{style:dot(SIDE_COLORS.R)}),"補考/機車"),
        tab==="weekday"?h("button",{onClick:toggleSummer,style:summer?summerOnBtn:summerOffBtn},summer?"☀ 暑期加開中（點此關閉）":"☀ 暑期加開"):null,
        h("button",{onClick:toggleAll,style:{padding:"5px 12px",borderRadius:6,border:"1px solid #cbd5e1",background:"#fff",color:"#475569",fontSize:12,fontWeight:600,cursor:"pointer"}}, allOpen?"▲ 全部收合":"▼ 全部攤開"),
        h("span",{style:{flex:1}}),
        h("button",{onClick:()=>promote("A"),style:promoteBtn},`升A → ${prepNameA()}`),
        h("button",{onClick:()=>promote("B"),style:promoteBtn},`升B → ${prepNameB()}`),
      ),
      h(WeekTable,{
        grid,days,isOpenFn,toggleOpen,
        cellOf:cell, leftOf:left,
        labelA:nameA(), labelB:nameB(),
        prepMode:false,
        addP,removeP,editP,labelOf,
        clip, startCopyCell, startCopyDay, startCopyPerson, pasteToCell, pasteToDay, cancelCopy,
      }),
      h("p",{style:{fontSize:12,color:"#9ca3af",marginTop:12}},"司機看名單用 driver.html。升A／升B 會把預備該欄搬上車、舊欄封存，需升期密碼。"),
    ),
  );
}

// ── 週表元件（營運表與預備表共用）──
function WeekTable({ grid,days,isOpenFn,toggleOpen,cellOf,leftOf,labelA,labelB,prepMode,prepLeftFn,addP,removeP,editP,labelOf,clip,startCopyCell,startCopyDay,startCopyPerson,pasteToCell,pasteToDay,cancelCopy }){
  const copying = !!clip;
  const srcLabel = clip ? (clip.mode==="day" ? `週${DAY_NAME[clip.day]} 整天` : clip.mode==="person" ? clip.person.name : "單一班次") : "";
  // 整天沒有任何班次的日子（例如平日的週三）→ 顯示「接駁車休息」
  const restDays = {};
  for(const day of days){
    const hasAny = grid.some(row => { const dc=row.days.find(x=>x.day===day); return dc && dc.routes.length>0; });
    restDays[day] = !hasAny;
  }
  const firstRestRow = {}; // 每個休息日，記第一個出現的列index，只在那列顯示文字
  return h("div",null,
    copying ? h("div",{style:{display:"flex",alignItems:"center",gap:10,background:"#fef9c3",border:"1px solid #fde047",borderRadius:10,padding:"8px 14px",marginBottom:10,fontSize:13,flexWrap:"wrap"}},
      h("span",{style:{fontWeight:700,color:"#854d0e"}},`📋 已複製「${srcLabel}」`),
      h("span",{style:{color:"#854d0e"}}, clip.mode==="day" ? "請點目標『那天的標題下方的貼到這天』" : "點某班的「貼到這班」，或點某天標題貼到整天對應班次"),
      h("button",{onClick:cancelCopy,style:{marginLeft:"auto",border:"none",background:"#854d0e",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}},"取消複製"),
    ) : null,
    copying ? h("button",{onClick:cancelCopy,style:{position:"fixed",right:16,bottom:20,zIndex:60,border:"none",background:"#854d0e",color:"#fff",borderRadius:24,padding:"12px 22px",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 12px rgba(0,0,0,0.25)"}},"✕ 取消複製") : null,
    h("div",{id:"tableWrap",style:{overflowX:"auto",border:"1px solid #e5e7eb",borderRadius:12,background:"#fff"}},
    h("table",{id:"mainTable",style:{borderCollapse:"separate",borderSpacing:0,width:"100%",minWidth:760}},
      h("thead",{id:"mainThead"},h("tr",null,
        h("th",{style:{...thTime,background:"#f9fafb"}},"時段"),
        days.map(day=>h("th",{key:day,style:{...thDay,background:"#f9fafb"}},
          h("div",null,"週"+DAY_NAME[day]),
          restDays[day] ? null : (copying
            ? h("button",{onClick:()=>pasteToDay(day),style:pasteDayBtn},"⬇貼到這天")
            : h("button",{onClick:()=>startCopyDay(day),style:copyDayBtn},"複製這天")),
        )),
      )),
      h("tbody",null,grid.map((row,rowIdx)=>h("tr",{key:row.slot.time},
        h("td",{style:row.slot.summer?{...tdTime,background:"#fff7ed"}:tdTime},
          h("div",{style:{fontWeight:800,fontSize:15,color:row.slot.summer?"#c2410c":"#1f2937"}},row.slot.time),
          h("div",{style:{fontSize:11,color:row.slot.summer?"#ea580c":"#9ca3af",fontWeight:row.slot.summer?700:400}},row.slot.summer?"☀暑期":row.slot.label)),
        row.days.map(dc=>{
          if(restDays[dc.day]){
            // 休息日：只在第一列顯示提示，其餘留白
            if(firstRestRow[dc.day]===undefined) firstRestRow[dc.day]=rowIdx;
            const showText = firstRestRow[dc.day]===rowIdx;
            return h("td",{key:dc.day,style:{...tdCell,background:"#f8fafc",textAlign:"center",verticalAlign:"middle"}},
              showText ? h("div",{style:{color:"#94a3b8",fontSize:13,fontWeight:600,lineHeight:1.6}},"🚌",h("br"),"接駁車休息") : null);
          }
          return h("td",{key:dc.day,style:tdCell},
          dc.routes.length===0?h("span",{style:{color:"#d1d5db",fontSize:12}},"—"):null,
          dc.routes.map(({route,time})=>{
            const key=tk(route.id,dc.day,time); const c=cellOf(key);
            const isOpen=isOpenFn(key);
            const lfShow = prepMode ? null : leftOf(key);
            const pLeftA = prepMode ? prepLeftFn(key,"A") : null;
            const pLeftB = prepMode ? prepLeftFn(key,"B") : null;
            const isClipSrc = clip && clip.mode==="cell" && clip.key===key;
            return h("div",{key:route.id,style:{marginBottom:6,border:isClipSrc?"2px solid #f59e0b":`1px solid ${route.color}33`,borderLeft:`3px solid ${route.color}`,borderRadius:8,padding:"6px 8px",background:isClipSrc?"#fffbeb":"#fff"}},
              h("div",{style:{display:"flex",alignItems:"center",gap:6}},
                h("span",{style:{fontSize:12,fontWeight:700,color:route.color}},route.name),
                prepMode
                  ? h("span",{style:{fontSize:10,color:"#9ca3af",marginLeft:"auto"}},`可收 A${pLeftA}/B${pLeftB}`)
                  : h("span",{style:{fontSize:11,color:lfShow<=0?"#dc2626":lfShow<=2?"#d97706":"#059669",fontWeight:700,marginLeft:"auto"}},"剩"+lfShow),
              ),
              h("div",{style:{fontSize:11,color:"#6b7280",marginTop:2,display:"flex",gap:6,flexWrap:"wrap"}},
                h("span",{style:{color:SIDE_COLORS.A}},`${labelA} ${c.A.length}`),
                h("span",{style:{color:SIDE_COLORS.B}},`${labelB} ${c.B.length}`),
                prepMode?null:h("span",{style:{color:SIDE_COLORS.R}},`補考/機車 ${c.R.length}`),
              ),
              copying
                ? (isClipSrc
                    ? h("div",{style:{marginTop:4,fontSize:11,textAlign:"center",color:"#b45309",fontWeight:700}},"← 來源")
                    : h("button",{onClick:()=>pasteToCell(key),style:{marginTop:4,width:"100%",fontSize:11,padding:"3px 0",borderRadius:6,border:"none",background:"#fde047",color:"#854d0e",cursor:"pointer",fontWeight:700}},"⬇貼到這班"))
                : h("div",{style:{display:"flex",gap:4,marginTop:4}},
                    h("button",{onClick:()=>toggleOpen(key),style:{flex:1,fontSize:11,padding:"3px 0",borderRadius:6,border:"none",background:isOpen?"#e5e7eb":"#f3f4f6",color:"#374151",cursor:"pointer",fontWeight:600}},isOpen?"收合":"登記/名單"),
                    (c.A.length+c.B.length+c.R.length)>0 ? h("button",{onClick:()=>startCopyCell(key),title:"複製這班",style:{fontSize:11,padding:"3px 8px",borderRadius:6,border:"1px solid #e5e7eb",background:"#fff",color:"#6b7280",cursor:"pointer",fontWeight:600}},"複製") : null,
                  ),
              isOpen && !copying ? h(CellEditor,{cKey:key,c,route,lf:prepMode?Math.min(pLeftA,pLeftB):lfShow,labelOf,addP,removeP,editP,prepMode,pLeftA,pLeftB,onCopyPerson:startCopyPerson}):null,
            );
          })
        );
        })
      ))),
    ),
    ),
  );
}

    ) : null,

function NumBox({ val, onSave }){
  const [edit,setEdit]=useState(null); // null=顯示外部值；字串=編輯中
  const shown = edit===null ? String(val) : edit;
  return h("input",{
    type:"number", value:shown,
    onChange:(e)=>setEdit(e.target.value),
    onFocus:(e)=>setEdit(String(val)),
    onBlur:(e)=>{ const v=e.target.value; setEdit(null); if(v!==""&&parseInt(v,10)!==val) onSave(v); },
    onKeyDown:(e)=>{ if(e.key==="Enter") e.target.blur(); },
    style:cohortInput,
  });
}

function OperatorPicker({ staff, operator, setOperator }){
  const inList = staff.includes(operator);
  const [mode,setMode]=useState(operator && !inList ? "other" : "list");
  function pick(v){
    if(v==="__other__"){ setMode("other"); setOperator(""); localStorage.setItem("op_name",""); }
    else { setMode("list"); setOperator(v); localStorage.setItem("op_name",v); }
  }
  const unset = !operator.trim();
  return h("label",{style:{display:"flex",alignItems:"center",gap:4,fontSize:13,color:unset?"#dc2626":"#6b7280",marginLeft:"auto",fontWeight:unset?700:400}},unset?"⚠ 請選操作者":"操作者",
    h("select",{value: mode==="other"?"__other__":operator, onChange:(e)=>pick(e.target.value),
      style:{padding:"4px 6px",borderRadius:6,border:unset?"2px solid #dc2626":"1px solid #d1d5db",fontSize:13,background:unset?"#fef2f2":"#fff"}},
      h("option",{value:"",disabled:true},"請選擇"),
      staff.map(n=>h("option",{key:n,value:n},n)),
      h("option",{value:"__other__"},"其他…"),
    ),
    mode==="other"?h("input",{value:operator,placeholder:"手打名字",autoFocus:true,
      onChange:(e)=>{setOperator(e.target.value);localStorage.setItem("op_name",e.target.value);},
      style:{width:72,padding:"4px 6px",borderRadius:6,border:"1px solid #d1d5db",fontSize:13}}):null,
  );
}

function CellEditor({ cKey, c, route, lf, labelOf, addP, removeP, editP, prepMode, pLeftA, pLeftB, onCopyPerson }) {
  const [side,setSide]=useState("A"); const [name,setName]=useState(""); const [phone,setPhone]=useState(""); const [note,setNote]=useState("");
  const stops=ROUTE_STOPS[route.id]; const [stop,setStop]=useState(stops?stops[0]:"");
  // 預備模式：該 side 的剩餘位；營運模式：整班剩餘位
  const sideLeft = prepMode ? (side==="A"?pLeftA:pLeftB) : lf;
  function submit(){ addP(cKey,side,name,phone,stops?stop:undefined,note); setName("");setPhone("");setNote(""); }
  return h("div",{style:{marginTop:6,background:"#fafafa",borderRadius:6,padding:6}},
    h(NameList,{c,route,removeP,editP,cKey,hideR:prepMode,onCopyPerson}),
    h("div",{style:{display:"flex",borderRadius:6,overflow:"hidden",border:"1px solid #d1d5db",marginTop:6,width:"fit-content"}},
      h("button",{onClick:()=>setSide("A"),style:sideBtn(side==="A",SIDE_COLORS.A)},labelOf("A")),
      h("button",{onClick:()=>setSide("B"),style:sideBtn(side==="B",SIDE_COLORS.B)},labelOf("B")),
      prepMode?null:h("button",{onClick:()=>setSide("R"),style:sideBtn(side==="R",SIDE_COLORS.R)},"補考/機車"),
    ),
    prepMode?h("div",{style:{fontSize:11,color:sideLeft<=0?"#dc2626":"#6b7280",marginTop:4}},`${labelOf(side)} 這班還可收 ${sideLeft} 位`):null,
    h("div",{style:{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}},
      h("input",{placeholder:"姓名",value:name,onChange:(e)=>setName(e.target.value),style:inS(60)}),
      h("input",{placeholder:"電話",value:phone,onChange:(e)=>setPhone(e.target.value),onBlur:(e)=>setPhone(fmtPhone(e.target.value)),style:inS(92)}),
      h("input",{placeholder:"備註(首堂日…)",value:note,onChange:(e)=>setNote(e.target.value),style:inS(110)}),
      stops?h("select",{value:stop,onChange:(e)=>setStop(e.target.value),style:{padding:"5px",borderRadius:6,border:"1px solid #d1d5db",fontSize:12,background:"#fff"}},stops.map(s=>h("option",{key:s,value:s},s))):null,
      h("button",{onClick:submit,disabled:sideLeft<=0,style:{padding:"5px 10px",borderRadius:6,border:"none",background:sideLeft<=0?"#d1d5db":"#1f2937",color:"#fff",fontSize:12,fontWeight:600,cursor:sideLeft<=0?"not-allowed":"pointer"}},sideLeft<=0?"滿":"加"),
    ),
  );
}

// ── 管理頁（第二道密碼）：員工名單 + 異動紀錄 ──────────
function LogPage() {
  const [ok,setOk]=useState(false);
  const [items,setItems]=useState(null);
  const [staff,setStaff]=useState([]);
  const [main,setMain]=useState(null); // 保留 main 其餘欄位以免覆寫
  const [newName,setNewName]=useState("");

  useEffect(()=>{
    if(!ok)return;
    const u1=onSnapshot(LOG,(snap)=>{
      const v=snap.data();
      setItems(v&&v.items?[...v.items].sort((a,b)=>b.t-a.t):[]);
    },(e)=>{console.error(e);setItems([]);});
    const u2=onSnapshot(DOC,(snap)=>{
      const v=snap.data()||{};
      setMain(v); setStaff(v.staff||[]);
    },(e)=>{console.error(e);});
    return ()=>{u1();u2();};
  },[ok]);

  async function saveStaff(list){
    const base = main || {};
    await setDoc(DOC, { ...base, staff: list, updatedAt: Date.now() });
  }
  function addStaff(){
    const n=newName.trim();
    if(!n || staff.includes(n)) { setNewName(""); return; }
    const list=[...staff,n]; setStaff(list); saveStaff(list); setNewName("");
  }
  function delStaff(n){
    const list=staff.filter(x=>x!==n); setStaff(list); saveStaff(list);
  }

  if(!ok) return h(Gate,{title:"管理登入",hint:"請輸入管理密碼",pass:ADMIN_PASSWORD,onPass:()=>setOk(true)});
  if(items===null) return h("div",{style:{padding:20}},h("div",{className:"spin"}));

  const ACT_COLOR={ "新增":"#059669","刪除":"#dc2626","修改":"#2563eb","改梯次名":"#7c3aed","清空梯次":"#dc2626","升期":"#1d4ed8","預備新增":"#0891b2","預備刪除":"#dc2626" };
  const fmt=(t)=>{ const d=new Date(t); const p=(n)=>String(n).padStart(2,"0"); return `${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; };

  return h("div",null,
    // 員工名單管理
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden",marginBottom:16}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:14}},"員工名單"),
      h("div",{style:{padding:"10px 14px",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}},
        staff.length===0?h("span",{style:{color:"#9ca3af",fontSize:13}},"尚無員工，請於下方新增"):null,
        staff.map(n=>h("span",{key:n,style:{display:"inline-flex",alignItems:"center",gap:6,background:"#f1f5f9",borderRadius:8,padding:"4px 10px",fontSize:13,fontWeight:600}},
          n, h("button",{onClick:()=>delStaff(n),style:{border:"none",background:"none",color:"#dc2626",cursor:"pointer",fontSize:13,padding:0}},"✕"))),
      ),
      h("div",{style:{padding:"0 14px 12px",display:"flex",gap:8}},
        h("input",{value:newName,placeholder:"新增員工姓名",onChange:(e)=>setNewName(e.target.value),onKeyDown:(e)=>e.key==="Enter"&&addStaff(),style:{flex:1,maxWidth:200,padding:"6px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:13}}),
        h("button",{onClick:addStaff,style:{padding:"6px 16px",borderRadius:8,border:"none",background:"#1f2937",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer"}},"新增"),
      ),
    ),
    // 異動紀錄
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden"}},
    h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:14,display:"flex",alignItems:"center"}},
      "異動紀錄",h("span",{style:{marginLeft:"auto",fontSize:12,color:"#9ca3af",fontWeight:400}},`共 ${items.length} 筆 · 保留 60 天`)),
    items.length===0?h("div",{style:{padding:24,textAlign:"center",color:"#9ca3af",fontSize:14}},"目前沒有紀錄"):
    h("div",null, items.map((it,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid #f6f6f6",fontSize:13}},
      h("span",{style:{color:"#9ca3af",minWidth:78,fontVariantNumeric:"tabular-nums"}},fmt(it.t)),
      h("span",{style:{fontWeight:700,minWidth:48}},it.who||"—"),
      h("span",{style:{color:ACT_COLOR[it.act]||"#374151",fontWeight:600,minWidth:60}},it.act),
      h("span",{style:{color:"#6b7280"}},it.slot||""),
      it.name?h("span",{style:{fontWeight:600,marginLeft:"auto"}},it.name):null,
    ))),
  ),
    // 封存名單（升期退場，留 30 天）
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden",marginTop:16}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:14,display:"flex",alignItems:"center"}},
        "封存名單（升期退場）",h("span",{style:{marginLeft:"auto",fontSize:12,color:"#9ca3af",fontWeight:400}},"保留 30 天")),
      (!main||!main.archive||main.archive.length===0)
        ? h("div",{style:{padding:24,textAlign:"center",color:"#9ca3af",fontSize:14}},"目前沒有封存名單")
        : h("div",null, [...main.archive].sort((a,b)=>b.t-a.t).map((a,i)=>h("div",{key:i,style:{padding:"10px 14px",borderBottom:"1px solid #f6f6f6"}},
            h("div",{style:{fontSize:13,fontWeight:700,marginBottom:4}},
              `${a.cohort}`,
              h("span",{style:{fontWeight:400,color:"#9ca3af",marginLeft:8}},`${fmt(a.t)} · ${a.who||"—"} 升期 · 共 ${a.people.length} 位`)),
            h("div",{style:{fontSize:12,color:"#6b7280",display:"flex",flexWrap:"wrap",gap:"2px 10px"}},
              a.people.map((pp,j)=>h("span",{key:j},`${pp.name}${pp.slot?`（${pp.slot}）`:""}`))),
          ))),
    ),
  );
}

const inS=(w)=>({width:w,padding:"5px 7px",borderRadius:6,border:"1px solid #d1d5db",fontSize:12});
const copyDayBtn={marginTop:4,fontSize:10,padding:"2px 8px",borderRadius:5,border:"1px solid #e5e7eb",background:"#fff",color:"#6b7280",cursor:"pointer",fontWeight:600};
const pasteDayBtn={marginTop:4,fontSize:10,padding:"2px 8px",borderRadius:5,border:"none",background:"#fde047",color:"#854d0e",cursor:"pointer",fontWeight:700};
const summerOffBtn={padding:"5px 12px",borderRadius:6,border:"1px solid #fdba74",background:"#fff",color:"#c2410c",fontSize:12,fontWeight:700,cursor:"pointer"};
const summerOnBtn={padding:"5px 12px",borderRadius:6,border:"none",background:"#f97316",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer"};
const printBtn=(c)=>({padding:"6px 10px",borderRadius:8,border:"1px solid "+c,background:"#fff",color:c,fontSize:13,fontWeight:700,cursor:"pointer"});
const promoteBtn={padding:"5px 12px",borderRadius:6,border:"1px solid #93c5fd",background:"#eff6ff",color:"#1d4ed8",fontSize:12,fontWeight:700,cursor:"pointer"};
const cohortInput={width:64,padding:"4px 6px",borderRadius:6,border:"1px solid #d1d5db",fontSize:13,fontWeight:600};
const sideBtn=(a,color)=>({padding:"4px 10px",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:a?color:"#fff",color:a?"#fff":"#6b7280"});

function Root(){
  const [ok,setOk]=useState(sessionStorage.getItem("counter_ok")==="1");
  if(!ok) return h(Gate,{title:"櫃台登入",hint:"請輸入櫃台密碼",pass:COUNTER_PASSWORD,onPass:()=>{sessionStorage.setItem("counter_ok","1");setOk(true);}});
  return h(Counter);
}
createRoot(document.getElementById("root")).render(h(Root));
</script>
