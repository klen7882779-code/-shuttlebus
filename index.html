<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>接駁車週表 · 櫃台 · 第一駕訓班</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #f1f5f9; }
  #root { min-height: 100vh; }
  .spin { width: 28px; height: 28px; border: 3px solid #e5e7eb; border-top-color: #2563eb; border-radius: 50%; animation: r 0.8s linear infinite; }
  @keyframes r { to { transform: rotate(360deg); } }
  .gate { max-width: 320px; margin: 16vh auto; padding: 28px; background:#fff; border-radius:16px; box-shadow:0 4px 24px rgba(0,0,0,.08); font-family: system-ui,sans-serif; }
  .gate input { width:100%; padding:10px; border:1px solid #d1d5db; border-radius:8px; font-size:16px; margin:12px 0; }
  .gate button { width:100%; padding:10px; border:none; border-radius:8px; background:#1f2937; color:#fff; font-size:15px; font-weight:600; cursor:pointer; }
</style>
</head>
<body>
<div id="root"><div style="display:flex;justify-content:center;align-items:center;height:100vh"><div class="spin"></div></div></div>

<script type="module">
import {
  h, useState, useEffect, useMemo, createRoot, DOC, LOG, onSnapshot, setDoc, getDoc, writeLog, writeBackup, listBackups,
  SEAT_CAP, ROUTES, ROUTE_STOPS, SIDE_COLORS, WEEKDAYS, WEEKENDS, DAY_NAME,
  tk, EMPTY, fmtPhone, mondayOf, weekLabel, upcomingMondays, mondayWeeksAgo, buildGrid, buildMotoGrid, MOTO_SLOTS, MOTO_DAYS, MOTO_CAP, motoKey, NameList, dot, tabGroup, tabBtn, thTime, thDay, tdTime, tdCell
} from "./app-core.js";

// ── 密碼（要改就改這兩行）────────────────────────────
const COUNTER_PASSWORD = "22102270";   // 櫃台登記
const ADMIN_PASSWORD   = "admin22102270"; // 異動紀錄頁（只有你）
const CLEAR_PASSWORD   = "22101079";       // 清空梯次

const ROUTE_NAME = Object.fromEntries(ROUTES.map(r=>[r.id,r.name]));
function slotDesc(key){ // 把 trip key 還原成可讀描述
  const [rid,day,time]=key.split("_");
  return `${ROUTE_NAME[rid]} 週${DAY_NAME[day]} ${time}`;
}

function Gate({ title, hint, pass, onPass }) {
  const [v,setV]=useState(""); const [err,setErr]=useState(false);
  function go(){ if(v===pass){ onPass(); } else setErr(true); }
  return h("div",{className:"gate"},
    h("div",{style:{fontSize:20,fontWeight:800,marginBottom:4}},title),
    h("div",{style:{fontSize:16,color:"#6b7280"}},hint),
    h("input",{type:"password",value:v,placeholder:"密碼",onChange:(e)=>{setV(e.target.value);setErr(false);},onKeyDown:(e)=>e.key==="Enter"&&go()}),
    err?h("div",{style:{color:"#dc2626",fontSize:16,marginBottom:8}},"密碼錯誤"):null,
    h("button",{onClick:go},"進入"),
  );
}

function Counter() {
  const [tab, setTab] = useState("weekday");
  const [page, setPage] = useState("table"); // table | log
  const [numA, setNumA] = useState(459);      // 營運 A 欄期數
  const [numB, setNumB] = useState(458);      // 營運 B 欄期數
  const [prepNumA, setPrepNumA] = useState(460); // 預備 A 期數
  const [prepNumB, setPrepNumB] = useState(459); // 預備 B 期數
  const [data, setData] = useState({});       // 營運名單
  const [motoW, setMotoW] = useState({}); // 機車滾動週名單：{ "YYYY-MM-DD(週一)": { motoKey: {L:[]} } }
  const weeks = upcomingMondays(4);       // 本週+未來三週（每次 render 重算，跨週自動滾動）
  const curMonday = weeks[0];
  const [mBand, setMBand] = useState(curMonday); // 機車子頁籤（週一日期字串）
  const shownBand = weeks.includes(mBand) ? mBand : curMonday; // 跨週後自動校正到本週
  const [prep, setPrep] = useState({});       // 新生預備名單
  const [archive, setArchive] = useState([]); // 封存（升期退場），留30天
  const [openCell, setOpenCell] = useState(null);
  const [allOpen, setAllOpen] = useState(true); // 預設全部攤開
  const [closedSet, setClosedSet] = useState({}); // 全開模式下，被單獨收起的格子
  const [selRoute, setSelRoute] = useState("all"); // 路線篩選 all/gongguan/zhongxiao/zhonghe
  const [clip, setClip] = useState(null); // 複製來源 {mode:'cell'|'day', table, key?, day?}
  const [loaded, setLoaded] = useState(false);
  const [saving, setSaving] = useState(false);
  const [operator, setOperator] = useState(localStorage.getItem("op_name")||"");
  const [staff, setStaff] = useState([]);
  const [showHelp, setShowHelp] = useState(localStorage.getItem("hide_help")!=="1");
  const [summer, setSummer] = useState(false);

  useEffect(() => {
    const unsub = onSnapshot(DOC, (snap)=>{
      const v=snap.data();
      if(v){
        setData(v.data||{});
        setMotoW(v.motoW||{});
        setPrep(v.prep||{});
        setSummer(!!v.summer);
        if(typeof v.numA==="number")setNumA(v.numA);
        if(typeof v.numB==="number")setNumB(v.numB);
        if(typeof v.prepNumA==="number")setPrepNumA(v.prepNumA);
        if(typeof v.prepNumB==="number")setPrepNumB(v.prepNumB);
        setArchive(v.archive||[]);
        setStaff(v.staff||[]);
      }
      setLoaded(true);
    }, (e)=>{console.error(e);setLoaded(true);});
    return ()=>unsub();
  }, []);

  // 浮動表頭：原表頭捲出畫面頂端時，複製一條固定在最上方
  useEffect(()=>{
    let clone=null;
    function sync(){
      const thead=document.getElementById("mainThead");
      const table=document.getElementById("mainTable");
      const wrap=document.getElementById("tableWrap");
      if(!thead||!table||!wrap){ if(clone){clone.remove();clone=null;} return; }
      const rect=thead.getBoundingClientRect();
      const wrapRect=wrap.getBoundingClientRect();
      // 表頭捲到畫面頂以上，且表格還在畫面內 → 顯示浮動表頭
      const shouldShow = rect.top < 0 && wrapRect.bottom > 40;
      if(shouldShow){
        if(!clone){
          clone=document.createElement("div");
          clone.style.position="fixed";
          clone.style.top="0";
          clone.style.zIndex="50";
          clone.style.overflow="hidden";
          clone.style.pointerEvents="none";
          clone.style.boxShadow="0 2px 6px rgba(0,0,0,0.08)";
          document.body.appendChild(clone);
        }
        // 對齊原表格位置與寬度，並跟隨橫向捲動
        clone.style.left=wrapRect.left+"px";
        clone.style.width=wrapRect.width+"px";
        const tb=document.createElement("table");
        tb.style.borderCollapse="separate";
        tb.style.borderSpacing="0";
        tb.style.width=table.offsetWidth+"px";
        tb.style.tableLayout="fixed";
        tb.style.marginLeft=(-wrap.scrollLeft)+"px";
        const headTr=thead.querySelector("tr");
        const newThead=document.createElement("thead");
        const newTr=document.createElement("tr");
        const origThs=headTr.querySelectorAll("th");
        origThs.forEach(th=>{
          const ntd=document.createElement("th");
          ntd.style.width=th.offsetWidth+"px";
          ntd.style.background="#f9fafb";
          ntd.style.borderBottom="2px solid #e5e7eb";
          ntd.style.padding="8px";
          ntd.style.fontSize="14px";
          ntd.style.fontWeight="700";
          ntd.style.textAlign="center";
          // 只取「週X」那行文字，不含按鈕
          const dayDiv=th.querySelector("div");
          ntd.textContent = dayDiv ? dayDiv.textContent : th.textContent;
          newTr.appendChild(ntd);
        });
        newThead.appendChild(newTr);
        tb.appendChild(newThead);
        clone.innerHTML="";
        clone.appendChild(tb);
      } else if(clone){ clone.remove(); clone=null; }
    }
    window.addEventListener("scroll",sync,{passive:true});
    window.addEventListener("resize",sync);
    const wrap=document.getElementById("tableWrap");
    if(wrap) wrap.addEventListener("scroll",sync,{passive:true});
    sync();
    return ()=>{
      window.removeEventListener("scroll",sync);
      window.removeEventListener("resize",sync);
      if(wrap) wrap.removeEventListener("scroll",sync);
      if(clone){clone.remove();clone=null;}
    };
  });

  const who = () => operator.trim();
  function requireOp(){
    if(!who()){ alert("請先在右上角選擇操作者，才能登記或修改。"); return false; }
    return true;
  }

  async function persist(patch) {
    setSaving(true);
    const payload = {
      data, prep, motoW, numA, numB, prepNumA, prepNumB, archive, staff, summer,
      ...patch, updatedAt: Date.now(),
    };
    try { await setDoc(DOC, payload); }
    catch(e){ console.error(e); alert("儲存失敗，請檢查網路"); }
    setSaving(false);
  }
  // 梯次名組合
  const nameA = ()=>`${numA}A`;
  const nameB = ()=>`${numB}B`;
  const prepNameA = ()=>`${prepNumA}A`;
  const prepNameB = ()=>`${prepNumB}B`;
  const cell=(k)=>data[k]||EMPTY();
  const used=(k)=>{const c=cell(k);return c.A.length+c.B.length+c.R.length;};
  const left=(k)=>SEAT_CAP-used(k);

  // 預備表 cell
  const pcell=(k)=>prep[k]||EMPTY();
  // 預備剩餘位（簡化版）= 10 − 營運對向欄 − 預備另一欄
  //  預備A 扣：營運B + 預備B；預備B 扣：營運A + 預備A
  function prepLeft(k, side){
    const oc = data[k]||EMPTY();
    const pc = prep[k]||EMPTY();
    const opViaOperating = side==="A" ? oc.B.length : oc.A.length; // 正式班對向
    const opViaPrep      = side==="A" ? pc.B.length : pc.A.length; // 預備另一欄
    const usedThis = pc[side].length;
    return SEAT_CAP - opViaOperating - opViaPrep - usedThis;
  }

  // ── 機車班操作（滾動週制：以週一日期為鍵，本週+未來三週；週日結訓後自動退場）──
  const mStore=(which)=> motoW[which] || {};
  const mSet=(which,next)=>{
    const nw = { ...motoW, [which]: next };
    // 自動清理：結訓超過 8 週的舊週名單移除（備份與異動紀錄仍可查），避免資料無限累積
    const cutoff = mondayWeeksAgo(8);
    for(const wk in nw){ if(wk < cutoff) delete nw[wk]; }
    setMotoW(nw); persist({motoW:nw});
  };
  const mcell=(which,k)=> mStore(which)[k] || {L:[]};
  const mUsed=(which,k)=> (mStore(which)[k]||{L:[]}).L.length;
  const mLabel=(which)=> "機車班("+weekLabel(which)+")";
  // 清空整週（填錯整週想重來用；結訓的週會自動退場，不需要清）：需清空密碼，清空前強制備份
  async function mClearBand(which){
    if(!requireOp())return;
    const store=mStore(which);
    const total=Object.keys(store).reduce((s,k)=>s+((store[k]||{L:[]}).L.length),0);
    if(total===0){ alert(mLabel(which)+"目前沒有名單。"); return; }
    const pw=prompt(`清空「${mLabel(which)}」全部 ${total} 位名單。\n請輸入清空密碼：`);
    if(pw===null) return;
    if(pw!==CLEAR_PASSWORD){ alert("清空密碼錯誤，未執行。"); return; }
    if(!confirm(`確定清空「${mLabel(which)}」共 ${total} 位？\n（清空前系統會先自動備份，誤按可在「異動紀錄」頁還原）`)) return;
    const ok = await writeBackup({ data, prep, motoW, archive, staff }, `清空${mLabel(which)}`, who());
    if(!ok){ alert("備份失敗，為避免資料遺失已中止清空。請檢查網路後再試一次。"); return; }
    mSet(which,{});
    writeLog({who:who(),act:"清空機車班",slot:mLabel(which),name:`${total}位`});
    alert(`已清空「${mLabel(which)}」。`);
  }
  function addMoto(which,k,name,phone,note){
    if(!requireOp())return;
    if(!name.trim())return;
    const store=mStore(which); const c=store[k]||{L:[]};
    const person={id:Date.now()+Math.floor(Math.random()*1000),name:name.trim(),phone:(phone||"").trim(),note:(note||"").trim()};
    const next={...store,[k]:{L:[...c.L,person]}};
    mSet(which,next);
    writeLog({who:who(),act:"機車新增",slot:weekLabel(which)+"・"+k.replace("moto_","週").replace("_"," "),name:name.trim()});
    if(next[k].L.length>MOTO_CAP) alert("此時段"+mLabel(which)+"已超過 "+MOTO_CAP+" 位（目前 "+next[k].L.length+" 位），超額的請自行安排改搭汽車班或移除。");
  }
  function removeMoto(which,k,id){
    if(!requireOp())return;
    const store=mStore(which); const c=store[k]||{L:[]};
    const t=c.L.find(x=>x.id===id);
    if(!confirm(`確定刪除「${t?t.name:""}」？`)) return;
    const next={...store,[k]:{L:c.L.filter(x=>x.id!==id)}};
    mSet(which,next);
    writeLog({who:who(),act:"機車刪除",slot:weekLabel(which)+"・"+k.replace("moto_","週").replace("_"," "),name:t?t.name:""});
  }
  function editMoto(which,k,id,fields){
    if(!requireOp())return;
    const store=mStore(which); const c=store[k]||{L:[]};
    const old=c.L.find(x=>x.id===id);
    const next={...store,[k]:{L:c.L.map(x=> x.id!==id?x:{...x,name:fields.name.trim(),phone:(fields.phone||"").trim(),note:(fields.note||"").trim()})}};
    mSet(which,next);
    writeLog({who:who(),act:"機車修改",slot:weekLabel(which)+"・"+k.replace("moto_","週").replace("_"," "),name:`${old?old.name:""} → ${fields.name.trim()}`});
  }
  // （四班制：機車不再升期，各班結訓後用「清空此班」重收下一輪）
  // 機車複製：來源(整天/單班/單人) → 目標，疊加
  const [mclip,setMclip]=useState(null); // {which, mode:'cell'|'day'|'person', key?, day?, person?}
  function mStartCopyCell(which,key){ setMclip({which,mode:"cell",key}); }
  function mStartCopyDay(which,day){ setMclip({which,mode:"day",day}); }
  function mStartCopyPerson(which,key,person){ setMclip({which,mode:"person",key,person}); }
  function mCancelCopy(){ setMclip(null); }
  // 將 people 疊加進機車某時段的 L 陣列，同姓名+電話的人略過不重複新增
  function mergeMotoList(curL, people){
    const out=[...curL]; let added=0, duplicate=0;
    for(const p of people){
      if(out.some(x=>samePerson(x,p))){ duplicate++; continue; }
      out.push({...p,id:Date.now()+Math.floor(Math.random()*100000)});
      added++;
    }
    return { list:out, added, duplicate };
  }
  function mPasteCell(which,destKey){
    if(!mclip||!requireOp())return;
    const src=mStore(mclip.which);
    let people=[];
    if(mclip.mode==="cell") people=(src[mclip.key]||{L:[]}).L;
    else if(mclip.mode==="person") people=[mclip.person];
    else { alert("整天複製請點某天標題貼上。"); return; }
    if(people.length===0){ alert("來源沒有名單。"); mCancelCopy(); return; }
    const store=mStore(which); const cur=store[destKey]||{L:[]};
    const { list, added, duplicate } = mergeMotoList(cur.L, people);
    const next={...store,[destKey]:{L:list}};
    mSet(which,next);
    writeLog({who:who(),act:"機車複製",slot:weekLabel(which)+"・"+destKey.replace("moto_","週").replace("_"," "),name:`${added}位${duplicate?`（重複略過${duplicate}）`:""}`});
    mCancelCopy();
    if(duplicate) alert(`${duplicate} 位已存在（同姓名同電話），未重複新增。`);
    if(next[destKey].L.length>MOTO_CAP) alert("貼上後此時段已超過 "+MOTO_CAP+" 位，請自行調整。");
  }
  async function mPasteDay(which,destDay){
    if(!mclip||!requireOp())return;
    const src=mStore(mclip.which);
    const nextStore={...mStore(which)};
    let cnt=0, dupTotal=0;
    if(mclip.mode==="day"){
      if(mclip.day===destDay){ alert("來源和目標同一天。"); return; }
      const srcKeys=Object.keys(src).filter(k=>{ const parts=k.split("_"); return Number(parts[1])===mclip.day && (src[k]||{L:[]}).L.length>0; });
      if(srcKeys.length===0){ alert("來源那天沒有名單。"); mCancelCopy(); return; }
      // 備份：機車整天複製前存一份完整快照
      const bk = await writeBackup({ data, prep, motoW, archive, staff }, `機車整天複製（${mLabel(which)}週${mclip.day}→週${destDay}）`, who());
      if(!bk && !confirm("備份沒有存成功（可能是網路問題）。整天複製只是把人疊加過去、不會刪除原本資料，仍要繼續嗎？")) return;
      for(const k of srcKeys){
        const parts=k.split("_"); const t=parts[2];
        const destKey=motoKey(destDay,t);
        const cur=nextStore[destKey]||{L:[]};
        const res=mergeMotoList(cur.L, src[k].L);
        nextStore[destKey]={L:res.list};
        cnt+=res.added; dupTotal+=res.duplicate;
      }
    } else {
      const parts=mclip.key.split("_"); const t=parts[2];
      const destKey=motoKey(destDay,t);
      const people = mclip.mode==="person"?[mclip.person]:(src[mclip.key]||{L:[]}).L;
      if(people.length===0){ alert("來源沒有名單。"); mCancelCopy(); return; }
      const cur=nextStore[destKey]||{L:[]};
      const res=mergeMotoList(cur.L, people);
      nextStore[destKey]={L:res.list};
      cnt+=res.added; dupTotal+=res.duplicate;
    }
    mSet(which,nextStore);
    writeLog({who:who(),act:"機車複製",slot:weekLabel(which)+"・→ 週"+DAY_NAME[destDay],name:`${cnt}位${dupTotal?`（重複略過${dupTotal}）`:""}`});
    mCancelCopy();
    if(dupTotal) alert(`已複製 ${cnt} 位，${dupTotal} 位已存在（同姓名同電話），未重複新增。`);
  }

  // ── 營運表操作 ──
  // 座位規則：表定 10 位；第 11 位需明確確認（超額登記，全年適用）；第 12 位硬擋
  function addP(k,side,name,phone,stop,note){
    if(!requireOp())return;
    if(!name.trim())return;
    const cnt = used(k);
    if(cnt >= SEAT_CAP + 1){ alert(`此班已超額（${cnt}/${SEAT_CAP}），最多只能超額 1 位，無法再新增。`); return; }
    const isOver = cnt >= SEAT_CAP;
    if(isOver && !confirm(`此班表定 ${SEAT_CAP} 位已滿。\n確定要「超額登記」第 ${cnt+1} 位嗎？\n（超額會標紅，司機端也會顯示，最多超額 1 位）`)) return;
    const c=data[k]||EMPTY();
    const person={id:Date.now(),name:name.trim(),phone:phone.trim(),note:(note||"").trim()};
    if(stop) person.stop=stop;
    const next={...data,[k]:{...c,[side]:[...c[side],person]}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:isOver?"超額新增":"新增", slot:slotDesc(k), side, name:name.trim() });
  }
  function removeP(k,side,id){
    if(!requireOp())return;
    const c=data[k]||EMPTY();
    const target=c[side].find(x=>x.id===id);
    if(!confirm(`確定刪除「${target?target.name:""}」？`)) return;
    const next={...data,[k]:{...c,[side]:c[side].filter(x=>x.id!==id)}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:"刪除", slot:slotDesc(k), side, name:target?target.name:"" });
  }
  function editP(k,side,id,fields){
    if(!requireOp())return;
    const c=data[k]||EMPTY();
    const old=c[side].find(x=>x.id===id);
    const updated=c[side].map(x=>{
      if(x.id!==id) return x;
      const nx={...x, name:fields.name.trim(), phone:(fields.phone||"").trim(), note:(fields.note||"").trim()};
      if(fields.stop) nx.stop=fields.stop; else delete nx.stop;
      return nx;
    });
    const next={...data,[k]:{...c,[side]:updated}};
    setData(next);persist({data:next});
    writeLog({ who:who(), act:"修改", slot:slotDesc(k), side, name:`${old?old.name:""} → ${fields.name.trim()}` });
  }

  // ── 預備表操作（不用密碼，跟登記一樣選操作者即可）──
  function addPrep(k,side,name,phone,stop,note){
    if(!requireOp())return;
    if(!name.trim()||prepLeft(k,side)<=0)return;
    const c=prep[k]||EMPTY();
    const person={id:Date.now(),name:name.trim(),phone:phone.trim(),note:(note||"").trim()};
    if(stop) person.stop=stop;
    const next={...prep,[k]:{...c,[side]:[...c[side],person]}};
    setPrep(next);persist({prep:next});
    writeLog({ who:who(), act:"預備新增", slot:slotDesc(k), side, name:name.trim() });
  }
  function removePrep(k,side,id){
    if(!requireOp())return;
    const c=prep[k]||EMPTY();
    const target=c[side].find(x=>x.id===id);
    if(!confirm(`確定刪除「${target?target.name:""}」？`)) return;
    const next={...prep,[k]:{...c,[side]:c[side].filter(x=>x.id!==id)}};
    setPrep(next);persist({prep:next});
    writeLog({ who:who(), act:"預備刪除", slot:slotDesc(k), side, name:target?target.name:"" });
  }
  function editPrep(k,side,id,fields){
    if(!requireOp())return;
    const c=prep[k]||EMPTY();
    const old=c[side].find(x=>x.id===id);
    const updated=c[side].map(x=>{
      if(x.id!==id) return x;
      const nx={...x, name:fields.name.trim(), phone:(fields.phone||"").trim(), note:(fields.note||"").trim()};
      if(fields.stop) nx.stop=fields.stop; else delete nx.stop;
      return nx;
    });
    const next={...prep,[k]:{...c,[side]:updated}};
    setPrep(next);persist({prep:next});
    writeLog({ who:who(), act:"預備修改", slot:slotDesc(k), side, name:`${old?old.name:""} → ${fields.name.trim()}` });
  }

  // ── 升期：把預備某欄整批搬入營運，舊欄封存退場 ──
  async function promote(side){
    if(!requireOp()) return;
    const oldName = side==="A"?nameA():nameB();
    const newNum  = side==="A"?prepNumA:prepNumB;
    const newName = `${newNum}${side}`;
    const pw = prompt(`升期：將「${newName}」升上車，「${oldName}」退場封存。\n請輸入升期密碼：`);
    if(pw===null) return;
    if(pw!==CLEAR_PASSWORD){ alert("升期密碼錯誤，未執行。"); return; }

    // 逐班檢查升期後會不會超載：新該欄人數 + 對向欄營運人數 > 10
    const overload=[];
    for(const k in prep){
      const pc=prep[k]; const oc=data[k]||EMPTY();
      const incoming=(pc[side]||[]).length;
      if(incoming===0) continue;
      const opposite = side==="A" ? oc.B.length : oc.A.length;
      if(incoming + opposite > SEAT_CAP) overload.push(`${slotDesc(k)}（新${incoming}+留${opposite}>${SEAT_CAP}）`);
    }
    if(overload.length){
      alert("以下班次升期後會超載，請先調整再升期：\n\n"+overload.join("\n"));
      return;
    }

    // 統計搬移人數
    let moved=0; for(const k in prep){ moved+=(prep[k][side]||[]).length; }
    if(!confirm(`確定升期？\n「${oldName}」全部退場封存，「${newName}」${moved} 位升上車。`)) return;

    // 備份：升期前存一份完整快照（data/prep/motoW/archive/staff）；備份沒成功就中止，絕不硬做
    const ok = await writeBackup({ data, prep, motoW, archive, staff }, `升期${side}（${oldName}→${newName}）`, who());
    if(!ok){ alert("備份失敗，為避免資料遺失已中止升期。請檢查網路後再試一次。"); return; }

    // 執行：營運該欄 <- 預備該欄；舊營運該欄 -> 封存
    const archivedPeople=[];
    const nextData={...data};
    const nextPrep={...prep};
    const allKeys=new Set([...Object.keys(data),...Object.keys(prep)]);
    for(const k of allKeys){
      const oc=data[k]||EMPTY();
      const pc=prep[k]||EMPTY();
      // 收集舊營運該欄到封存
      (oc[side]||[]).forEach(pp=>archivedPeople.push({ slot:slotDesc(k), side, ...pp }));
      // 新營運該欄 = 預備該欄
      nextData[k]={...oc,[side]:(pc[side]||[])};
      // 預備該欄清空
      nextPrep[k]={...pc,[side]:[]};
    }
    const now=Date.now();
    const KEEP=30*24*60*60*1000;
    const nextArchive=[...archive.filter(a=>now-a.t<KEEP), { t:now, cohort:oldName, who:who(), people:archivedPeople }];

    const patch={ data:nextData, prep:nextPrep, archive:nextArchive };
    if(side==="A"){ patch.numA=newNum; patch.prepNumA=prepNumA+1; setNumA(newNum); setPrepNumA(prepNumA+1); }
    else          { patch.numB=newNum; patch.prepNumB=prepNumB+1; setNumB(newNum); setPrepNumB(prepNumB+1); }
    setData(nextData); setPrep(nextPrep); setArchive(nextArchive);
    persist(patch);
    writeLog({ who:who(), act:"升期", slot:`${side}欄`, name:`${oldName} 退場 → ${newName} 上車（${moved}位）` });
    alert(`升期完成：${newName} 已上車（${moved} 位），${oldName} 已封存。`);
  }

  // 手動微調期數（萬一要修），不搬人只改數字；改動會寫入異動紀錄
  function setNum(which, val){
    const n=parseInt(val,10); if(isNaN(n)) return;
    const cur = which==="A"?numA : which==="B"?numB : which==="PA"?prepNumA : prepNumB;
    if(n===cur) return; // 沒變不問
    const label = which==="A"?"正式A" : which==="B"?"正式B" : which==="PA"?"預備A" : "預備B";
    if(!confirm(`確定把「${label}」期數從 ${cur} 改成 ${n} 嗎？\n（這會改變整欄梯次名稱）`)){
      // 取消：強制重繪回原值
      if(which==="A"){ setNumA(numA); } else if(which==="B"){ setNumB(numB); }
      else if(which==="PA"){ setPrepNumA(prepNumA); } else { setPrepNumB(prepNumB); }
      return;
    }
    if(which==="A"){ setNumA(n); persist({numA:n}); }
    else if(which==="B"){ setNumB(n); persist({numB:n}); }
    else if(which==="PA"){ setPrepNumA(n); persist({prepNumA:n}); }
    else if(which==="PB"){ setPrepNumB(n); persist({prepNumB:n}); }
    writeLog({ who:who(), act:"改期數", slot:label, name:`${cur} → ${n}` });
  }

  function editMainNums(){

  // ── 複製 / 貼上 ──────────────────────────────────
  const curTable = page==="prep" ? "prep" : "data";
  const curData  = page==="prep" ? prep : data;
  const curCell  = (k)=> (page==="prep"?prep:data)[k] || EMPTY();

  function startCopyCell(key){ setClip({ mode:"cell", table:curTable, key }); }
  function startCopyDay(day){ setClip({ mode:"day", table:curTable, day }); }
  function startCopyPerson(key, side, person){ setClip({ mode:"person", table:curTable, key, side, person }); }
  function cancelCopy(){ setClip(null); }

  // 把一個 person 依目標路線調整站點後回傳新物件（跨線站點處理）
  function adaptPerson(p, destRouteId){
    const np = { ...p, id: Date.now()+Math.floor(Math.random()*100000) };
    const stops = ROUTE_STOPS[destRouteId];
    if(stops){ if(!np.stop || !stops.includes(np.stop)) np.stop = stops[0]; }
    else { delete np.stop; }
    return np;
  }

  // 判斷是否為同一人（姓名+電話都相同才算，避免同名不同人誤判）
  function samePerson(a,b){
    return (a.name||"").trim()===(b.name||"").trim() && (a.phone||"").trim()===(b.phone||"").trim();
  }

  // 將 srcCell 的人疊加進 destKey（防爆＋防重複，回傳 {added, skipped, duplicate}）
  function mergeInto(destData, destKey, srcCell, destRouteId){
    const dc = destData[destKey] || EMPTY();
    const out = { A:[...dc.A], B:[...dc.B], R:[...dc.R] };
    let added=0, skipped=0, duplicate=0;
    for(const side of ["A","B","R"]){
      for(const p of (srcCell[side]||[])){
        const already = out.A.some(x=>samePerson(x,p)) || out.B.some(x=>samePerson(x,p)) || out.R.some(x=>samePerson(x,p));
        if(already){ duplicate++; continue; }
        const total = out.A.length+out.B.length+out.R.length;
        if(total>=SEAT_CAP){ skipped++; continue; }
        out[side].push(adaptPerson(p, destRouteId));
        added++;
      }
    }
    destData[destKey]=out;
    return { added, skipped, duplicate };
  }

  function pasteToCell(destKey){
    if(!clip) return;
    if(!requireOp()){ return; }
    const srcData = clip.table==="prep" ? prep : data;
    const destRouteId = destKey.split("_")[0];
    let srcCell, srcDesc;
    if(clip.mode==="cell"){ srcCell = srcData[clip.key]||EMPTY(); srcDesc=slotDesc(clip.key); }
    else if(clip.mode==="person"){ srcCell = { A:[], B:[], R:[], [clip.side]:[clip.person] }; srcDesc=`${clip.person.name}`; }
    else { alert("整天複製請點目標『那一天的標題』貼上，不是貼到單一格。"); return; }
    const srcTotal = srcCell.A.length+srcCell.B.length+srcCell.R.length;
    if(srcTotal===0){ alert("來源沒有乘客。"); cancelCopy(); return; }
    if(!confirm(`把「${srcDesc}」複製到「${slotDesc(destKey)}」？\n（疊加，超過 ${SEAT_CAP} 位的會略過；已存在同姓名同電話的人不會重複新增）`)) return;
    const next = page==="prep" ? {...prep} : {...data};
    const { added, skipped, duplicate } = mergeInto(next, destKey, srcCell, destRouteId);
    if(page==="prep"){ setPrep(next); persist({prep:next}); } else { setData(next); persist({data:next}); }
    writeLog({ who:who(), act:"複製", slot:`${srcDesc} → ${slotDesc(destKey)}`, name:`${added}位${skipped?`（滿座略過${skipped}）`:""}${duplicate?`（重複略過${duplicate}）`:""}` });
    cancelCopy();
    alert(`已複製 ${added} 位${skipped?`，${skipped} 位因滿座略過`:""}${duplicate?`，${duplicate} 位已存在（同姓名同電話）未重複新增`:""}。`);
  }

  async function pasteToDay(destDay){
    if(!clip) return;
    if(!requireOp()){ return; }
    const srcData = clip.table==="prep" ? prep : data;
    const next = page==="prep" ? {...prep} : {...data};
    let added=0, skipped=0, duplicate=0, classes=0;

    if(clip.mode==="day"){
      if(clip.day===destDay){ alert("來源和目標是同一天。"); return; }
      // 來源那天所有 key → 目標同 route 同 time
      const srcKeys = Object.keys(srcData).filter(k=>{ const[,d]=k.split("_"); return Number(d)===clip.day; });
      // 也包含來源那天「buildGrid 有班但還沒人」的就跳過（沒人不用搬）
      const realSrc = srcKeys.filter(k=>{ const c=srcData[k]; return c && (c.A.length+c.B.length+c.R.length)>0; });
      if(realSrc.length===0){ alert("來源那天沒有任何乘客。"); cancelCopy(); return; }
      if(!confirm(`把「週${DAY_NAME[clip.day]}」整天名單，複製到「週${DAY_NAME[destDay]}」？\n（各班對應貼上、疊加，超過 ${SEAT_CAP} 位略過；已存在同姓名同電話的人不會重複新增）`)) return;
      // 備份：大量複製（整天）前存一份完整快照
      const bk = await writeBackup({ data, prep, motoW, archive, staff }, `整天複製（${curTable==="prep"?"預備表":"營運表"}週${DAY_NAME[clip.day]}→週${DAY_NAME[destDay]}）`, who());
      if(!bk && !confirm("備份沒有存成功（可能是網路問題）。整天複製只是把人疊加過去、不會刪除原本資料，仍要繼續嗎？")) return;
      for(const k of realSrc){
        const [r,,t]=k.split("_");
        const destKey = tk(r,destDay,t);
        const res = mergeInto(next, destKey, srcData[k], r);
        added+=res.added; skipped+=res.skipped; duplicate+=res.duplicate; classes++;
      }
      writeLog({ who:who(), act:"複製整天", slot:`週${DAY_NAME[clip.day]} → 週${DAY_NAME[destDay]}`, name:`${classes}班 ${added}位${skipped?`（滿座略過${skipped}）`:""}${duplicate?`（重複略過${duplicate}）`:""}` });
    } else {
      // 單班/單人來源，貼到某天 → 該天「同路線同時段」那班
      const [r,,t]=clip.key.split("_");
      const destKey = tk(r,destDay,t);
      const srcCell = clip.mode==="person"
        ? { A:[], B:[], R:[], [clip.side]:[clip.person] }
        : (srcData[clip.key]||EMPTY());
      const srcDesc = clip.mode==="person" ? clip.person.name : slotDesc(clip.key);
      const srcTotal=srcCell.A.length+srcCell.B.length+srcCell.R.length;
      if(srcTotal===0){ alert("來源沒有乘客。"); cancelCopy(); return; }
      if(!confirm(`把「${srcDesc}」複製到「${slotDesc(destKey)}」？`)) return;
      const res=mergeInto(next, destKey, srcCell, r); added=res.added; skipped=res.skipped; duplicate=res.duplicate;
      writeLog({ who:who(), act:"複製", slot:`${srcDesc} → ${slotDesc(destKey)}`, name:`${added}位${skipped?`（滿座略過${skipped}）`:""}${duplicate?`（重複略過${duplicate}）`:""}` });
    }
    if(page==="prep"){ setPrep(next); persist({prep:next}); } else { setData(next); persist({data:next}); }
    cancelCopy();
    alert(`已複製 ${added} 位${skipped?`，${skipped} 位因滿座略過`:""}${duplicate?`，${duplicate} 位已存在（同姓名同電話）未重複新增`:""}。`);
  }

function MotoRow({ p, which, mkey, removeMoto, editMoto, copying, onCopyPerson }){
  const [edit,setEdit]=useState(false);
  const [name,setName]=useState(p.name),[phone,setPhone]=useState(p.phone||""),[note,setNote]=useState(p.note||"");
  if(edit){
    const save=()=>{ if(!name.trim())return; editMoto(which,mkey,p.id,{name,phone,note}); setEdit(false); };
    return h("div",{style:{display:"flex",gap:4,alignItems:"center",padding:"3px 0",flexWrap:"wrap"}},
      h("input",{value:name,onChange:e=>setName(e.target.value),style:inS(60)}),
      h("input",{value:phone,placeholder:"電話",onChange:e=>setPhone(e.target.value),onBlur:e=>setPhone(fmtPhone(e.target.value)),style:inS(90)}),
      h("input",{value:note,placeholder:"備註",onChange:e=>setNote(e.target.value),style:inS(80)}),
      h("button",{onClick:save,style:{border:"none",background:"#2563eb",color:"#fff",borderRadius:5,padding:"3px 8px",fontSize:14,cursor:"pointer",fontWeight:600}},"存"),
      h("button",{onClick:()=>setEdit(false),style:{border:"none",background:"none",color:"#9ca3af",cursor:"pointer",fontSize:14}},"取消"),
    );
  }
  return h("div",{style:{display:"flex",alignItems:"center",gap:6,fontSize:16,padding:"3px 0",borderBottom:"1px solid #f6f6f6"}},
    h("span",{style:{fontWeight:600}},p.name),
    p.phone?h("span",{style:{fontSize:14,color:"#9ca3af"}},p.phone):null,
    p.note?h("span",{style:{fontSize:14,color:"#0891b2",background:"#ecfeff",borderRadius:4,padding:"0 5px"}},p.note):null,
    copying ? null : h("button",{onClick:()=>{setName(p.name);setPhone(p.phone||"");setNote(p.note||"");setEdit(true);},style:{marginLeft:"auto",border:"none",background:"none",color:"#2563eb",cursor:"pointer",fontSize:14}},"改"),
    copying ? null : h("button",{onClick:()=>onCopyPerson(which,mkey,p),style:{border:"none",background:"none",color:"#d97706",cursor:"pointer",fontSize:14}},"複製"),
    copying ? null : h("button",{onClick:()=>removeMoto(which,mkey,p.id),style:{border:"none",background:"none",color:"#dc2626",cursor:"pointer",fontSize:14}},"✕"),
  );
}

function MotoEditor({ which, mkey, addMoto }){
  const [name,setName]=useState(""),[phone,setPhone]=useState(""),[note,setNote]=useState("");

    h("input",{placeholder:"姓名",value:name,onChange:e=>setName(e.target.value),style:inS(60)}),

function WeekTable({ grid,days,isOpenFn,toggleOpen,selRoute,cellOf,leftOf,labelA,labelB,prepMode,prepLeftFn,addP,removeP,editP,labelOf,clip,startCopyCell,startCopyDay,startCopyPerson,pasteToCell,pasteToDay,cancelCopy }){

    h("div",{id:"tableWrap",style:{overflowX:"auto",border:"1px solid #e5e7eb",borderRadius:12,background:"#fff"}},

function NumBox({ val, onSave }){
  const [edit,setEdit]=useState(null); // null=顯示外部值；字串=編輯中
  const shown = edit===null ? String(val) : edit;
  return h("input",{
    type:"number", value:shown,
    onChange:(e)=>setEdit(e.target.value),
    onFocus:(e)=>setEdit(String(val)),
    onBlur:(e)=>{ const v=e.target.value; setEdit(null); if(v!==""&&parseInt(v,10)!==val) onSave(v); },
    onKeyDown:(e)=>{ if(e.key==="Enter") e.target.blur(); },
    style:cohortInput,
  });
}

function OperatorPicker({ staff, operator, setOperator }){
  const inList = staff.includes(operator);
  const [mode,setMode]=useState(operator && !inList ? "other" : "list");
  function pick(v){
    if(v==="__other__"){ setMode("other"); setOperator(""); localStorage.setItem("op_name",""); }
    else { setMode("list"); setOperator(v); localStorage.setItem("op_name",v); }
  }
  const unset = !operator.trim();
  return h("label",{style:{display:"flex",alignItems:"center",gap:4,fontSize:16,color:unset?"#dc2626":"#6b7280",marginLeft:"auto",fontWeight:unset?700:400}},unset?"⚠ 請選操作者":"操作者",
    h("select",{value: mode==="other"?"__other__":operator, onChange:(e)=>pick(e.target.value),
      style:{padding:"4px 6px",borderRadius:6,border:unset?"2px solid #dc2626":"1px solid #d1d5db",fontSize:16,background:unset?"#fef2f2":"#fff"}},
      h("option",{value:"",disabled:true},"請選擇"),
      staff.map(n=>h("option",{key:n,value:n},n)),
      h("option",{value:"__other__"},"其他…"),

      onChange:(e)=>{setOperator(e.target.value);localStorage.setItem("op_name",e.target.value);},
      style:{width:72,padding:"4px 6px",borderRadius:6,border:"1px solid #d1d5db",fontSize:16}}):null,
  );
}

function CellEditor({ cKey, c, route, lf, labelOf, addP, removeP, editP, prepMode, pLeftA, pLeftB, onCopyPerson }) {
  const [side,setSide]=useState("A"); const [name,setName]=useState(""); const [phone,setPhone]=useState(""); const [note,setNote]=useState("");
  const stops=ROUTE_STOPS[route.id]; const [stop,setStop]=useState(stops?stops[0]:"");
  // 預備模式：該 side 的剩餘位；營運模式：整班剩餘位

    h("div",{style:{display:"flex",gap:4,marginTop:4,flexWrap:"wrap"}},

      h("input",{placeholder:"備註(首堂日…)",value:note,onChange:(e)=>setNote(e.target.value),style:inS(110)}),
      stops?h("select",{value:stop,onChange:(e)=>setStop(e.target.value),style:{padding:"5px",borderRadius:6,border:"1px solid #d1d5db",fontSize:15,background:"#fff"}},stops.map(s=>h("option",{key:s,value:s},s))):null,

    ),
  );

// ── 管理頁（第二道密碼）：員工名單 + 異動紀錄 ──────────
function LogPage() {
  const [ok,setOk]=useState(false);
  const [items,setItems]=useState(null);
  const [staff,setStaff]=useState([]);
  const [main,setMain]=useState(null); // 保留 main 其餘欄位以免覆寫
  const [newName,setNewName]=useState("");
  const [backups,setBackups]=useState(null);
  const [restoring,setRestoring]=useState(false);

  useEffect(()=>{
    if(!ok)return;
    const u1=onSnapshot(LOG,(snap)=>{
      const v=snap.data();
      setItems(v&&v.items?[...v.items].sort((a,b)=>b.t-a.t):[]);
    },(e)=>{console.error(e);setItems([]);});
    const u2=onSnapshot(DOC,(snap)=>{
      const v=snap.data()||{};
      setMain(v); setStaff(v.staff||[]);
    },(e)=>{console.error(e);});
    const u3=listBackups(setBackups);
    return ()=>{u1();u2();u3();};
  },[ok]);

  async function saveStaff(list){
    const base = main || {};
    const num = (v, d)=> typeof v==="number" ? v : d;
    // 只寫白名單欄位，避免 main 混入非白名單欄位導致寫入被規則擋下
    await setDoc(DOC, {
      data: base.data||{}, prep: base.prep||{}, motoW: base.motoW||{},
      numA: num(base.numA,459), numB: num(base.numB,458),
      prepNumA: num(base.prepNumA,460), prepNumB: num(base.prepNumB,459),
      archive: base.archive||[], staff: list, summer: !!base.summer,
      updatedAt: Date.now(),
    });
  }
  function addStaff(){
    const n=newName.trim();
    if(!n || staff.includes(n)) { setNewName(""); return; }
    const list=[...staff,n]; setStaff(list); saveStaff(list); setNewName("");
  }
  function delStaff(n){
    const list=staff.filter(x=>x!==n); setStaff(list); saveStaff(list);
  }

  // 還原：用選定的備份快照，整包覆蓋 data/prep/motoW/archive/staff
  // （梯次期數 numA/numB/prepNumA/prepNumB 與暑期設定 summer 不受影響）
  async function restoreBackup(b){
    const when = fmt(b.t);
    if(!confirm(`確定要還原到這個備份點嗎？\n\n【${b.trigger}】\n備份時間：${when}\n操作者：${b.who||"—"}\n\n這會整包覆蓋：營運表、預備表、機車各週名單、封存名單、員工名單。\n（不影響梯次期數與暑期開關）\n\n還原前系統會先自動把「目前」的狀態也存一份備份，萬一還原錯了可以再還原回來。`)) return;
    setRestoring(true);
    try{
      // 還原前，先把目前狀態存一份備份（保險）；這份沒存成就不能還原，否則還原錯了救不回來
      const cur = main || {};
      const safeOk = await writeBackup(
        { data:cur.data||{}, prep:cur.prep||{}, motoW:cur.motoW||{}, archive:cur.archive||[], staff:cur.staff||[] },
        "還原前自動備份", "系統"
      );
      if(!safeOk){ alert("無法先備份目前狀態，為安全起見已中止還原。請檢查網路後再試一次。"); setRestoring(false); return; }
      const s = b.snapshot||{};
      const base = main || {};
      // 只挑 firestore.rules 白名單內的欄位重建，避免 main 混入非白名單欄位導致寫入被規則擋下
      const num = (v, d)=> typeof v==="number" ? v : d;
      const patch = {
        // 名單類：用備份快照覆蓋
        data: s.data||{}, prep: s.prep||{}, motoW: s.motoW||{},
        archive: s.archive||[], staff: s.staff||[],
        // 期數／暑期：沿用目前值（備份不含這些，維持現況）
        numA: num(base.numA,459), numB: num(base.numB,458),
        prepNumA: num(base.prepNumA,460), prepNumB: num(base.prepNumB,459),
        summer: !!base.summer,
        updatedAt: Date.now(),
      };
      await setDoc(DOC, patch);
      writeLog({ who:"管理員", act:"還原備份", slot:b.trigger, name:when });
      alert("已還原完成。");
    } catch(e){ console.error(e); alert("還原失敗，請檢查網路後再試一次。"); }
    setRestoring(false);
  }

  if(!ok) return h(Gate,{title:"管理登入",hint:"請輸入管理密碼",pass:ADMIN_PASSWORD,onPass:()=>setOk(true)});
  if(items===null) return h("div",{style:{padding:20}},h("div",{className:"spin"}));

  const ACT_COLOR={ "新增":"#059669","刪除":"#dc2626","修改":"#2563eb","預備修改":"#2563eb","機車正期修改":"#2563eb","機車新生修改":"#2563eb","改梯次名":"#7c3aed","改期數":"#7c3aed","清空梯次":"#dc2626","清空機車班":"#dc2626","機車新增":"#059669","超額新增":"#dc2626","機車刪除":"#dc2626","機車修改":"#2563eb","機車複製":"#d97706","升期":"#1d4ed8","預備新增":"#0891b2","預備刪除":"#dc2626","還原備份":"#b91c1c" };
  const fmt=(t)=>{ const d=new Date(t); const p=(n)=>String(n).padStart(2,"0"); return `${d.getMonth()+1}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; };
  // 快照人數統計（給備份卡片顯示用）
  function snapCount(store, isMoto){
    let n=0;
    for(const k in store||{}){ const c=store[k]; n += isMoto ? (c.L||[]).length : (c.A||[]).length+(c.B||[]).length+(c.R||[]).length; }
    return n;
  }
  // 機車滾動週總人數（motoW 為兩層：週一日期 → 時段 → L）
  function motoWCount(mw){
    let n=0;
    for(const wk in mw||{}){ for(const k in mw[wk]||{}){ n += ((mw[wk][k]||{}).L||[]).length; } }
    return n;
  }

  return h("div",null,
    // 員工名單管理
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden",marginBottom:16}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:16}},"員工名單"),
      h("div",{style:{padding:"10px 14px",display:"flex",flexWrap:"wrap",gap:8,alignItems:"center"}},
        staff.length===0?h("span",{style:{color:"#9ca3af",fontSize:16}},"尚無員工，請於下方新增"):null,
        staff.map(n=>h("span",{key:n,style:{display:"inline-flex",alignItems:"center",gap:6,background:"#f1f5f9",borderRadius:8,padding:"4px 10px",fontSize:16,fontWeight:600}},
          n, h("button",{onClick:()=>delStaff(n),style:{border:"none",background:"none",color:"#dc2626",cursor:"pointer",fontSize:16,padding:0}},"✕"))),
      ),
      h("div",{style:{padding:"0 14px 12px",display:"flex",gap:8}},
        h("input",{value:newName,placeholder:"新增員工姓名",onChange:(e)=>setNewName(e.target.value),onKeyDown:(e)=>e.key==="Enter"&&addStaff(),style:{flex:1,maxWidth:200,padding:"6px 10px",borderRadius:8,border:"1px solid #d1d5db",fontSize:16}}),
        h("button",{onClick:addStaff,style:{padding:"6px 16px",borderRadius:8,border:"none",background:"#1f2937",color:"#fff",fontSize:16,fontWeight:600,cursor:"pointer"}},"新增"),
      ),
    ),
    // 備份還原
    h("div",{style:{border:"1px solid #fecaca",borderRadius:12,background:"#fff",overflow:"hidden",marginBottom:16}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #fee2e2",fontWeight:700,fontSize:16,display:"flex",alignItems:"center",background:"#fef2f2"}},
        "備份還原",h("span",{style:{marginLeft:"auto",fontSize:15,color:"#9ca3af",fontWeight:400}},backups===null?"讀取中…":`共 ${backups.length} 份 · 保留 60 天`)),
      h("div",{style:{padding:"8px 14px",fontSize:14,color:"#9ca3af"}},"只在升期、機車升期、整天複製等大量異動前自動存一份完整快照（營運表／預備表／機車正期／機車新生／封存名單／員工名單）。"),
      backups===null ? h("div",{style:{padding:24,textAlign:"center"}},h("div",{className:"spin",style:{margin:"0 auto"}})) :
      backups.length===0 ? h("div",{style:{padding:24,textAlign:"center",color:"#9ca3af",fontSize:16}},"目前沒有備份") :
      h("div",null, backups.map(b=>h("div",{key:b.id,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid #f6f6f6",fontSize:15,flexWrap:"wrap"}},
        h("span",{style:{color:"#9ca3af",minWidth:78,fontVariantNumeric:"tabular-nums"}},fmt(b.t)),
        h("span",{style:{fontWeight:700}},b.trigger),
        h("span",{style:{color:"#6b7280"}},b.who?`（${b.who}）`:""),
        h("span",{style:{color:"#94a3b8",fontSize:13}},
          `營運${snapCount(b.snapshot&&b.snapshot.data)}位 · 預備${snapCount(b.snapshot&&b.snapshot.prep)}位 · 機車${motoWCount(b.snapshot&&b.snapshot.motoW)}位`),
        h("button",{onClick:()=>restoreBackup(b),disabled:restoring,style:{marginLeft:"auto",border:"none",background:restoring?"#fca5a5":"#dc2626",color:"#fff",borderRadius:6,padding:"4px 12px",fontSize:14,fontWeight:700,cursor:restoring?"not-allowed":"pointer"}},restoring?"還原中…":"還原此份"),
      ))),
    ),
    // 異動紀錄
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden"}},
    h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:16,display:"flex",alignItems:"center"}},
      "異動紀錄",h("span",{style:{marginLeft:"auto",fontSize:15,color:"#9ca3af",fontWeight:400}},`共 ${items.length} 筆 · 保留 60 天`)),
    items.length===0?h("div",{style:{padding:24,textAlign:"center",color:"#9ca3af",fontSize:16}},"目前沒有紀錄"):
    h("div",null, items.map((it,i)=>h("div",{key:i,style:{display:"flex",alignItems:"center",gap:10,padding:"8px 14px",borderBottom:"1px solid #f6f6f6",fontSize:16}},
      h("span",{style:{color:"#9ca3af",minWidth:78,fontVariantNumeric:"tabular-nums"}},fmt(it.t)),
      h("span",{style:{fontWeight:700,minWidth:48}},it.who||"—"),
      h("span",{style:{color:ACT_COLOR[it.act]||"#374151",fontWeight:600,minWidth:60}},it.act),
      h("span",{style:{color:"#6b7280"}},it.slot||""),
      it.name?h("span",{style:{fontWeight:600,marginLeft:"auto"}},it.name):null,
    ))),
  ),
    // 封存名單（升期退場，留 30 天）
    h("div",{style:{border:"1px solid #e5e7eb",borderRadius:12,background:"#fff",overflow:"hidden",marginTop:16}},
      h("div",{style:{padding:"10px 14px",borderBottom:"1px solid #f0f0f0",fontWeight:700,fontSize:16,display:"flex",alignItems:"center"}},
        "封存名單（升期退場）",h("span",{style:{marginLeft:"auto",fontSize:15,color:"#9ca3af",fontWeight:400}},"保留 30 天")),
      (!main||!main.archive||main.archive.length===0)
        ? h("div",{style:{padding:24,textAlign:"center",color:"#9ca3af",fontSize:16}},"目前沒有封存名單")
        : h("div",null, [...main.archive].sort((a,b)=>b.t-a.t).map((a,i)=>h("div",{key:i,style:{padding:"10px 14px",borderBottom:"1px solid #f6f6f6"}},
            h("div",{style:{fontSize:16,fontWeight:700,marginBottom:4}},
              `${a.cohort}`,
              h("span",{style:{fontWeight:400,color:"#9ca3af",marginLeft:8}},`${fmt(a.t)} · ${a.who||"—"} 升期 · 共 ${a.people.length} 位`)),
            h("div",{style:{fontSize:15,color:"#6b7280",display:"flex",flexWrap:"wrap",gap:"2px 10px"}},
              a.people.map((pp,j)=>h("span",{key:j},`${pp.name}${pp.slot?`（${pp.slot}）`:""}`))),
          ))),
    ),
  );
}

const inS=(w)=>({width:w,padding:"5px 7px",borderRadius:6,border:"1px solid #d1d5db",fontSize:15});
const copyDayBtn={marginTop:4,fontSize:14,padding:"2px 8px",borderRadius:5,border:"1px solid #e5e7eb",background:"#fff",color:"#6b7280",cursor:"pointer",fontWeight:600};
const pasteDayBtn={marginTop:4,fontSize:14,padding:"2px 8px",borderRadius:5,border:"none",background:"#fde047",color:"#854d0e",cursor:"pointer",fontWeight:700};
const summerOffBtn={padding:"5px 12px",borderRadius:6,border:"1px solid #fdba74",background:"#fff",color:"#c2410c",fontSize:15,fontWeight:700,cursor:"pointer"};
const summerOnBtn={padding:"5px 12px",borderRadius:6,border:"none",background:"#f97316",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer"};
const printBtn=(c)=>({padding:"6px 10px",borderRadius:8,border:"1px solid "+c,background:"#fff",color:c,fontSize:16,fontWeight:700,cursor:"pointer"});
const promoteBtn={padding:"5px 12px",borderRadius:6,border:"1px solid #93c5fd",background:"#eff6ff",color:"#1d4ed8",fontSize:15,fontWeight:700,cursor:"pointer"};
const cohortInput={width:64,padding:"4px 6px",borderRadius:6,border:"1px solid #d1d5db",fontSize:16,fontWeight:600};
const sideBtn=(a,color)=>({padding:"4px 10px",border:"none",cursor:"pointer",fontSize:15,fontWeight:700,background:a?color:"#fff",color:a?"#fff":"#6b7280"});

function Root(){
  const [ok,setOk]=useState(sessionStorage.getItem("counter_ok")==="1");
  if(!ok) return h(Gate,{title:"櫃台登入",hint:"請輸入櫃台密碼",pass:COUNTER_PASSWORD,onPass:()=>{sessionStorage.setItem("counter_ok","1");setOk(true);}});
  return h(Counter);
}
createRoot(document.getElementById("root")).render(h(Root));
</script>
</body>
